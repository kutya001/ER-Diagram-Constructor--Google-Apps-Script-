<script>
// ═══════════════════════════════════════════════════════════
// TABLE MODALS — new wide layout with inline column editor
// ═══════════════════════════════════════════════════════════
let tbMode='create',editTid=null;
// Temporary column rows for new-table modal
let mtCols=[]; // [{_uid, name, type_id, description, is_pk, is_fk, fk_table_id, fk_column_id}]
let mtColUid=0;

function addTable(){
  if(!S.schema)return;
  tbMode='create';editTid=null;mtCols=[];
  document.getElementById('mt-title').textContent='Новая таблица';
  document.getElementById('mt-name').value='';
  document.getElementById('mt-desc').value='';
  fillCatAsg();
  renderMtGrid();
  showM('m-table');
}

function openEditTable(t){
  tbMode='edit';editTid=t.id;mtCols=[];
  document.getElementById('mt-title').textContent='Редактировать';
  document.getElementById('mt-name').value=t.name;
  document.getElementById('mt-desc').value=t.description||'';
  fillCatAsg(t.category_id,t.assignment_id);
  // Load existing columns into mtCols for display (edit mode shows read-only grid)
  const existing=gc(t.id).map(c=>({...c,_uid:++mtColUid}));
  mtCols=existing;
  renderMtGrid();
  showM('m-table');
}

function fillCatAsg(cid='',aid=''){
  document.getElementById('mt-cat').innerHTML='<option value="">— нет —</option>'+S.cats.map(c=>`<option value="${c.id}"${String(c.id)===String(cid)?' selected':''}>${esc(c.name)}</option>`).join('');
  document.getElementById('mt-asg').innerHTML='<option value="">— нет —</option>'+S.asgs.map(a=>`<option value="${a.id}"${String(a.id)===String(aid)?' selected':''}>${esc(a.name)}</option>`).join('');
}

// Type designation → is_pk / is_fk detection
function typeDesig(typeId){const ct=S.ctypes.find(t=>String(t.id)===String(typeId));return ct?ct.designation.toLowerCase():'';}
function typeIsPK(typeId){return typeDesig(typeId)==='pk';}
function typeIsFK(typeId){return typeDesig(typeId)==='fk';}

function onCatChange(){
  if(tbMode==='create')loadTplCols();
}

function loadTplCols(){
  const cid=document.getElementById('mt-cat').value;
  if(!cid){renderMtGrid();return;}
  const matched=S.tpls.filter(t=>!t.category_id||String(t.category_id)===String(cid));
  if(!matched.length){renderMtGrid();return;}
  // Build mtCols from templates (replace current)
  mtCols=[];
  matched.forEach(tpl=>{
    const tcols=S.tcols.filter(c=>String(c.template_id)===String(tpl.id)).sort((a,b)=>+a.position-+b.position);
    tcols.forEach(c=>{
      if(!mtCols.find(r=>r.name===c.name))
        mtCols.push({_uid:++mtColUid,name:c.name,type_id:c.type_id,description:c.description||'',is_pk:c.is_pk,is_fk:c.is_fk,fk_table_id:'',fk_column_id:''});
    });
  });
  renderMtGrid();
}

function mtNameChanged(){
  // nothing special needed
}

function renderMtGrid(){
  const tbody=document.getElementById('mt-col-tbody');
  if(!tbody)return;
  const pkCount=mtCols.filter(r=>{const t=typeDesig(r.type_id);return t==='pk';}).length;
  document.getElementById('mt-pk-warn').style.display=pkCount>1?'block':'none';
  document.getElementById('mt-col-count').textContent=`(${mtCols.length})`;
  tbody.innerHTML=mtCols.map((col,i)=>{
    const des=typeDesig(col.type_id);
    const isPk=des==='pk',isFk=des==='fk';
    const typeOpts=S.ctypes.map(t=>`<option value="${t.id}"${String(t.id)===String(col.type_id)?' selected':''}>${esc(t.designation)} — ${esc(t.name)}</option>`).join('');
    const fkSel=isFk?`<td>
      <select onchange="mtFkTChange(${col._uid},this.value)" style="width:100%;padding:3px 5px;background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:3px;font-size:10px">
        <option value="">— таблица —</option>
        ${fkTableOptsByCategory(schTables().filter(t=>t.name!==document.getElementById('mt-name')?.value),col.fk_table_id)}
      </select>
      <select onchange="mtFkCChange(${col._uid},this.value)" style="width:100%;padding:3px 5px;background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:3px;font-size:10px;margin-top:2px">
        <option value="">— pk-колонка —</option>
        ${S.columns.filter(c=>String(c.table_id)===String(col.fk_table_id)&&isPK(c)).map(c=>`<option value="${c.id}"${String(c.id)===String(col.fk_column_id)?' selected':''}>${esc(c.name)}</option>`).join('')}
      </select>
    </td>`:'';
    return`<tr data-uid="${col._uid}">
      <td><span class="drag-handle" draggable="true">⠿</span></td>
      <td><input type="text" value="${ea(col.name)}" placeholder="column_name" onchange="mtColChange(${col._uid},'name',this.value)"/></td>
      <td>
        <select onchange="mtColTypeChange(${col._uid},this.value)">
          <option value="">— тип —</option>${typeOpts}
        </select>
        ${isPk?'<div style="font-size:9px;color:var(--pk);margin-top:1px">🔑 Первичный ключ</div>':''}
        ${isFk?'<div style="font-size:9px;color:var(--fk);margin-top:1px">🔗 Внешний ключ</div>':''}
      </td>
      ${fkSel||''}
      <td><input type="text" value="${ea(col.description||'')}" placeholder="Описание" onchange="mtColChange(${col._uid},'description',this.value)"/></td>
      <td><button class="del-col-btn" onclick="mtDelRow(${col._uid})" title="Удалить">✕</button></td>
    </tr>`;
  }).join('');
  // Update FK header visibility
  const hasFk=mtCols.some(c=>typeIsFK(c.type_id));
  const fkHdr=document.getElementById('mt-fk-hdr');
  if(fkHdr)fkHdr.style.display=hasFk?'':'none';
  setupMtDrag();
}

function mtColChange(uid,field,val){const c=mtCols.find(r=>r._uid===uid);if(c)c[field]=val;}
function mtColTypeChange(uid,val){
  const c=mtCols.find(r=>r._uid===uid);if(!c)return;
  // PK validation
  if(typeIsPK(val)&&String(val)!==String(c.type_id)){
    const existPk=mtCols.find(r=>r._uid!==uid&&typeIsPK(r.type_id));
    if(existPk){toast('Только один PK на таблицу','err');renderMtGrid();return;}
  }
  c.type_id=val;c.is_pk=typeIsPK(val);c.is_fk=typeIsFK(val);
  if(!c.is_fk){c.fk_table_id='';c.fk_column_id='';}
  renderMtGrid();
}
function mtFkTChange(uid,val){const c=mtCols.find(r=>r._uid===uid);if(c){c.fk_table_id=val;c.fk_column_id='';}renderMtGrid();}
function mtFkCChange(uid,val){const c=mtCols.find(r=>r._uid===uid);if(c)c.fk_column_id=val;}
function mtAddRow(){mtCols.push({_uid:++mtColUid,name:'',type_id:'',description:'',is_pk:false,is_fk:false,fk_table_id:'',fk_column_id:''});renderMtGrid();}
function mtDelRow(uid){mtCols=mtCols.filter(r=>r._uid!==uid);renderMtGrid();}

function setupMtDrag(){
  const tbody=document.getElementById('mt-col-tbody');if(!tbody)return;
  let ds=null;
  tbody.querySelectorAll('tr').forEach(row=>{
    const handle=row.querySelector('.drag-handle');
    if(handle){
      handle.addEventListener('dragstart',e=>{ds=row;row.style.opacity='.4';e.dataTransfer.effectAllowed='move';});
      handle.addEventListener('dragend',()=>{row.style.opacity='1';rebuildMtOrder();});
    }
    row.addEventListener('dragover',e=>{e.preventDefault();if(row!==ds){const r=row.getBoundingClientRect();tbody.insertBefore(ds,e.clientY<r.top+r.height/2?row:row.nextSibling);}});
  });
}
function rebuildMtOrder(){
  const tbody=document.getElementById('mt-col-tbody');if(!tbody)return;
  const newOrder=[];
  tbody.querySelectorAll('tr[data-uid]').forEach(row=>{
    const c=mtCols.find(r=>String(r._uid)===row.dataset.uid);if(c)newOrder.push(c);
  });
  mtCols=newOrder;
}

async function submitTable(){
  const name=document.getElementById('mt-name').value.trim();
  if(!name){toast('Введите название','err');return;}
  const desc=document.getElementById('mt-desc').value.trim();
  const cid=document.getElementById('mt-cat').value,aid=document.getElementById('mt-asg').value;
  // PK validation
  const pkCount=mtCols.filter(c=>typeIsPK(c.type_id)).length;
  if(pkCount>1){toast('Допускается только один первичный ключ (PK)','err');return;}
  // Empty names
  if(mtCols.some(c=>!c.name.trim())){toast('Заполните названия всех столбцов','err');return;}

  if(tbMode==='create'){
    // OPTIMISTIC: instantly show table on canvas with temp id
    const wp=s2w(cv.width/2,cv.height/2);
    const tempId='tmp_'+Date.now();
    const tempTable={id:tempId,schema_id:S.schema.id,name,description:desc,category_id:cid,assignment_id:aid,pos_x:wp.x-TW/2,pos_y:wp.y-60,create_date_time:new Date().toISOString(),update_date_time:new Date().toISOString(),_pending:true};
    const tempCols=mtCols.map((c,i)=>({...c,id:'tmpcol_'+i+'_'+Date.now(),table_id:tempId,position:i+1,_pending:true}));
    S.tables.push(tempTable);tempCols.forEach(c=>{S.columns.push(c);});inv(tempId);
    S.table=tempTable;
    closeM('m-table');R();MR();renderPanel();
    toast('Таблица добавлена (синхронизация…)','inf');
    setSyncState('syncing');
    
    // Save original position to restore if needed
    const originalPos_x = tempTable.pos_x;
    const originalPos_y = tempTable.pos_y;
    
    // Background sync
    try{
      const res=await api('createTableWithTemplate',{schema_id:S.schema.id,name,description:desc,category_id:cid,assignment_id:aid,pos_x:tempTable.pos_x,pos_y:tempTable.pos_y,apply_templates:false});
      // Replace temp table with real - PRESERVE POSITION from original
      const idx=S.tables.findIndex(t=>t.id===tempId);
      if(idx>=0){
        // Ensure position is preserved - use original position if server response doesn't have it
        const serverTable = res.table;
        const finalPos_x = (serverTable.pos_x != null) ? serverTable.pos_x : originalPos_x;
        const finalPos_y = (serverTable.pos_y != null) ? serverTable.pos_y : originalPos_y;
        S.tables[idx]={...serverTable, pos_x: finalPos_x, pos_y: finalPos_y};
        S.table = S.tables[idx];
      }
      
      // Create columns from mtCols on the server
      const colReqs=mtCols.map((c,i)=>{
        const isPk = c.is_pk || typeIsPK(c.type_id);
        const isFk = c.is_fk || typeIsFK(c.type_id);
        return {
          action:'createColumn',
          payload:{
            table_id:res.table.id,
            name:c.name,
            description:c.description||'',
            type_id:c.type_id,
            is_pk: isPk,
            is_fk: isFk,
            fk_table_id:c.fk_table_id||'',
            fk_column_id:c.fk_column_id||'',
            position: i + 1
          }
        };
      });
      
      console.log('Creating columns, mtCols:', mtCols);
      console.log('Column requests:', colReqs);
      
      let newCols = [];
      if(colReqs.length){
        const colResults=await new Promise((res2,rej)=>{
          google.script.run.withSuccessHandler(r=>r.ok?res2(r.data):rej(new Error(r.error))).withFailureHandler(e=>rej(new Error(e.message))).processBatch(colReqs);
        });
        // Collect all created columns
        console.log('Created columns result:', colResults);
        newCols = colResults.filter(r=>r.ok&&r.data).map(r=>r.data);
        console.log('New columns extracted:', newCols);
      }
      
      // NOW remove temp columns (after creating real ones)
      S.columns=S.columns.filter(c=>c.table_id!==tempId);
      
      // Add real columns to state
      newCols.forEach(c=>{
        console.log('Adding column to S.columns:', c);
        S.columns.push(c);
      });
      
      console.log('Total S.columns after adding:', S.columns.length);
      console.log('Columns for table:', res.table.id, S.columns.filter(c=>String(c.table_id)===String(res.table.id)));
      
      // Invalidate cache for both temp and real table IDs
      inv(tempId);
      inv(res.table.id);
      
      // Force rebuild column cache by calling gc() which will re-filter S.columns
      const finalCols = gc(res.table.id);
      console.log('Final columns for table:', res.table.id, finalCols);
      console.log('S.columns count:', S.columns.length, 'filtered count:', S.columns.filter(c=>String(c.table_id)===String(res.table.id)).length);
      
      setSyncState('synced');
      toast(`Таблица «${name}» сохранена, ${finalCols.length} столбцов`,'ok');
      
      // Re-render everything with fresh data
      R();
      MR();
      renderPanel();
    }catch(e){toast('Ошибка сохранения: '+e.message,'err');setSyncState('error');R();MR();renderPanel();}
  }else{
    // Edit mode — just update header, columns managed separately
    closeM('m-table');
    try{
      const u=await api('updateTable',{id:editTid,name,description:desc,category_id:cid,assignment_id:aid});
      const i=S.tables.findIndex(t=>String(t.id)===String(editTid));
      if(i>=0)S.tables[i]={...S.tables[i],...u};S.table=S.tables[i];
      toast('Таблица сохранена','ok');
    }catch(e){toast('Ошибка: '+e.message,'err');}
    R();MR();renderPanel();
  }
}

async function cpTable(){
  if(!S.table)return;
  const src=S.table;
  const srcCols=gc(src.id);
  // Optimistic: show copy instantly with temp id
  const tempId='tmp_cp_'+Date.now();
  const tempTable={...src,id:tempId,name:src.name+'_copy',
    pos_x:(src.pos_x||100)+TW+30,pos_y:src.pos_y||100,_pending:true,
    create_date_time:new Date().toISOString(),update_date_time:new Date().toISOString()};
  const tempCols=srcCols.map((c,i)=>({...c,id:'tmpcol_cp_'+i+'_'+Date.now(),table_id:tempId,_pending:true}));
  S.tables.push(tempTable);
  tempCols.forEach(c=>{S.columns.push(c);});
  inv(tempId);
  S.table=tempTable;
  R();MR();renderPanel();
  setSyncState('pending');
  toast('Создание копии…','inf');
  
  // Save original position
  const originalPos_x = tempTable.pos_x;
  const originalPos_y = tempTable.pos_y;
  
  try{
    const nt=await api('copyTable',{id:src.id});
    // Remove temp table+cols
    S.tables=S.tables.filter(t=>t.id!==tempId);
    S.columns=S.columns.filter(c=>c.table_id!==tempId);
    inv(tempId);
    // Load real columns
    const nc=await api('getColumnsByTable',{table_id:nt.id});
    // Ensure position is preserved
    const finalPos_x = (nt.pos_x != null) ? nt.pos_x : originalPos_x;
    const finalPos_y = (nt.pos_y != null) ? nt.pos_y : originalPos_y;
    const preservedTable = {...nt, pos_x: finalPos_x, pos_y: finalPos_y};
    S.tables.push(preservedTable);
    nc.forEach(c=>{S.columns.push(c);inv(c.table_id);});
    S.table=preservedTable;
    setSyncState('synced');
    toast('Таблица скопирована','ok');R();MR();renderPanel();
  }catch(e){
    // Roll back
    S.tables=S.tables.filter(t=>t.id!==tempId);
    S.columns=S.columns.filter(c=>c.table_id!==tempId);
    inv(tempId);S.table=src;
    setSyncState('error');
    toast('Ошибка копирования: '+e.message,'err');R();MR();renderPanel();
  }
}
async function delTable(){
  if(!S.table)return;
  conf(`Удалить "${S.table.name}"?`,'Все колонки тоже будут удалены.',async()=>{
    setSyncState('syncing');
    try{
      const tid=String(S.table.id);
      if(!String(tid).startsWith('tmp_'))await api('deleteTable',{id:tid});
      S.columns.filter(c=>String(c.table_id)===tid).forEach(c=>inv(c.table_id));
      S.tables=S.tables.filter(t=>String(t.id)!==tid);
      S.columns=S.columns.filter(c=>String(c.table_id)!==tid);
      S.table=null;setSyncState('synced');toast('Таблица удалена','ok');R();MR();renderPanel();
    }catch(e){setSyncState('error');toast('Ошибка: '+e.message,'err');R();MR();renderPanel();}
  });
}
</script>
