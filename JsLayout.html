<script>
// ═══════════════════════════════════════════════════════════
// ZOOM / PAN / LAYOUT
// ═══════════════════════════════════════════════════════════
function zoomIn(){applyZ(1.2);}function zoomOut(){applyZ(.8);}
function applyZ(d){sc=Math.min(3,Math.max(.2,sc*d));document.getElementById('zoom-lbl').textContent=~~(sc*100)+'%';R();MR();}
function resetView(){sc=1;ox=80;oy=80;document.getElementById('zoom-lbl').textContent='100%';R();MR();}
// ═══════════════════════════════════════════════════════════
// AUTO LAYOUT — multiple modes
// ═══════════════════════════════════════════════════════════
function toggleLayoutMenu(e){
  e.stopPropagation();
  const m=document.getElementById('layout-menu');
  const btn=document.getElementById('btn-al');
  const open=m.style.display!=='none';
  
  if(open){
    m.style.display='none';
  } else {
    // Position menu relative to button to avoid overflow issues
    const btnRect=btn.getBoundingClientRect();
    m.style.display='block';
    m.style.position='fixed';
    m.style.top=(btnRect.bottom+4)+'px';
    m.style.left=btnRect.left+'px';
    m.style.zIndex='3000';
    
    // Close on outside click
    const close=(ev)=>{
      if(!m.contains(ev.target)&&ev.target!==btn){
        m.style.display='none';
        document.removeEventListener('click',close);
      }
    };
    setTimeout(()=>document.addEventListener('click',close),10);
  }
}

function doLayout(mode){
  document.getElementById('layout-menu').style.display='none';
  const ts=schTables();
  if(!ts.length)return;
  switch(mode){
    case 'smart':       layoutSmart(ts);       break;
    case 'hierarchical':layoutHierarchical(ts); break;
    case 'grid':        layoutGrid(ts);        break;
    case 'radial':      layoutRadial(ts);      break;
    case 'category':    layoutCategory(ts);    break;
    case 'compact':     layoutCompact(ts);     break;
  }
  R(); MR(); savePending();
  fitView(ts);
}

// Keep old autoLayout for backward compatibility
function autoLayout(){ doLayout('smart'); }

function fitView(ts){
  setTimeout(()=>{
    const xs=ts.map(t=>t.pos_x||0), ys=ts.map(t=>t.pos_y||0);
    const minX=Math.min(...xs), minY=Math.min(...ys);
    const maxX=Math.max(...xs.map((x,i)=>x+TW)), maxY=Math.max(...ts.map(t=>(t.pos_y||0)+TH+gc(t.id).length*CH));
    const pad=80;
    const scX=(cv.width-pad*2)/(maxX-minX||1), scY=(cv.height-pad*2)/(maxY-minY||1);
    sc=Math.min(scX,scY,1.4,Math.max(.15,scX));
    ox=-minX*sc+pad; oy=-minY*sc+pad;
    document.getElementById('zoom-lbl').textContent=Math.round(sc*100)+'%';
    R(); MR();
  },80);
}

// ── Mode 1: Smart (FK hierarchy — topological sort) ──────────
function layoutSmart(ts){
  const PAD_X=90, PAD_Y=70, CARD_W=TW+PAD_X; // Increased spacing
  const fkEdges={};
  ts.forEach(t=>{ fkEdges[String(t.id)]=new Set(); });
  ts.forEach(t=>gc(t.id).forEach(col=>{
    if(isFK(col)&&col.fk_table_id){
      const sid=String(t.id),pid=String(col.fk_table_id);
      if(fkEdges[sid]&&pid!==sid) fkEdges[sid].add(pid);
    }
  }));
  const inDeg={};
  ts.forEach(t=>{ inDeg[String(t.id)]=0; });
  Object.entries(fkEdges).forEach(([,parents])=>parents.forEach(pid=>{if(inDeg[pid]!==undefined)inDeg[pid]++;}));
  const queue=ts.filter(t=>inDeg[String(t.id)]===0).map(t=>String(t.id));
  const depth={};
  ts.forEach(t=>{ depth[String(t.id)]=0; });
  const visited=new Set();
  while(queue.length){
    const id=queue.shift();
    if(visited.has(id))continue; visited.add(id);
    Object.entries(fkEdges).forEach(([child,parents])=>{
      if(parents.has(id)){
        depth[child]=Math.max(depth[child],(depth[id]||0)+1);
        queue.push(child);
      }
    });
  }
  const maxD=Math.max(...Object.values(depth),0);
  ts.filter(t=>!visited.has(String(t.id))).forEach(t=>{ depth[String(t.id)]=maxD; });
  const cols={};
  ts.forEach(t=>{ const d=depth[String(t.id)]; if(!cols[d])cols[d]=[]; cols[d].push(t); });
  const startX=60,startY=60;
  const totalRows=Math.max(...Object.values(cols).map(g=>g.length),1);
  Object.keys(cols).sort((a,b)=>+a-+b).forEach((d,ci)=>{
    const group=cols[d].sort((a,b)=>a.name.localeCompare(b.name));
    const colH=group.length*(280+PAD_Y);
    const offsetY=startY+Math.max(0,(totalRows*(280+PAD_Y)-colH)/2);
    group.forEach((t,ri)=>{
      t.pos_x=startX+ci*CARD_W;
      t.pos_y=offsetY+ri*(280+PAD_Y);
      pending[t.id]=true;
    });
  });
}

// ── Mode 1.5: Hierarchical (hierarchical — like ERD tools) ──────────
function layoutHierarchical(ts){
  const PAD_X=90, PAD_Y=60, CARD_H=280;
  
  // Analyze dependencies
  const fkEdges={};
  ts.forEach(t=>{ fkEdges[String(t.id)]=new Set(); });
  ts.forEach(t=>gc(t.id).forEach(col=>{
    if(isFK(col)&&col.fk_table_id){
      const sid=String(t.id),pid=String(col.fk_table_id);
      if(fkEdges[sid]&&pid!==sid) fkEdges[sid].add(pid);
    }
  }));
  
  // Count incoming/outgoing FK connections
  const inDeg={};
  const outDeg={};
  ts.forEach(t=>{
    inDeg[String(t.id)]=0;
    outDeg[String(t.id)]=0;
  });
  Object.entries(fkEdges).forEach(([child,parents])=>{
    outDeg[child]=parents.size;
    parents.forEach(pid=>{
      if(inDeg[pid]!==undefined) inDeg[pid]++;
    });
  });
  
  // Classify tables into layers
  const layers={
    refs: [],      // Dictionaries/reference tables (no incoming FK)
    main: [],      // Main tables (few outgoing FK, some incoming)
    details: [],   // Detail tables (many outgoing FK)
    trans: []      // Transaction tables (in the middle of flow)
  };
  
  ts.forEach(t=>{
    const tid=String(t.id);
    const name=t.name.toLowerCase();
    const isDict=name.startsWith('dict_')||name.startsWith('справочник');
    const out=outDeg[tid]||0;
    const inn=inDeg[tid]||0;
    
    if(isDict||inn===0){
      layers.refs.push(t);
    } else if(out===0&&inn>0){
      layers.trans.push(t);
    } else if(out>inn){
      layers.details.push(t);
    } else {
      layers.main.push(t);
    }
  });
  
  // If classification didn't work well, use dependency depth
  if(layers.refs.length+layers.main.length===0){
    const depth={};
    ts.forEach(t=>{ depth[String(t.id)]=0; });
    const queue=ts.filter(t=>inDeg[String(t.id)]===0).map(t=>String(t.id));
    const visited=new Set();
    while(queue.length){
      const id=queue.shift();
      if(visited.has(id))continue;
      visited.add(id);
      Object.entries(fkEdges).forEach(([child,parents])=>{
        if(parents.has(id)){
          depth[child]=Math.max(depth[child],(depth[id]||0)+1);
          queue.push(child);
        }
      });
    }
    
    const maxDepth=Math.max(...Object.values(depth),0);
    ts.forEach(t=>{
      const d=depth[String(t.id)];
      if(d===0) layers.refs.push(t);
      else if(d===maxDepth) layers.trans.push(t);
      else if(d===maxDepth-1&&maxDepth>1) layers.details.push(t);
      else layers.main.push(t);
    });
  }
  
  // Layout: refs top-right, main center, details left, trans bottom
  const startX=60, startY=60;
  
  // Place reference tables in top row
  layers.refs.sort((a,b)=>a.name.localeCompare(b.name));
  layers.refs.forEach((t,i)=>{
    t.pos_x=startX+(i%4)*(TW+PAD_X);
    t.pos_y=startY+Math.floor(i/4)*(CARD_H+PAD_Y);
    pending[t.id]=true;
  });
  
  // Place main tables in center (below refs)
  const mainStartX=startX+100;
  const mainStartY=startY+(Math.ceil(layers.refs.length/4))*(CARD_H+PAD_Y)+PAD_Y*2;
  layers.main.sort((a,b)=>a.name.localeCompare(b.name));
  layers.main.forEach((t,i)=>{
    t.pos_x=mainStartX+(i%3)*(TW+PAD_X);
    t.pos_y=mainStartY+Math.floor(i/3)*(CARD_H+PAD_Y);
    pending[t.id]=true;
  });
  
  // Place detail tables on the left
  const detailStartX=startX;
  const detailStartY=mainStartY;
  layers.details.sort((a,b)=>a.name.localeCompare(b.name));
  layers.details.forEach((t,i)=>{
    t.pos_x=detailStartX;
    t.pos_y=detailStartY+i*(CARD_H+PAD_Y);
    pending[t.id]=true;
  });
  
  // Place transaction tables at bottom
  const transStartY=Math.max(mainStartY,detailStartY+layers.details.length*(CARD_H+PAD_Y))+PAD_Y*2;
  layers.trans.sort((a,b)=>a.name.localeCompare(b.name));
  layers.trans.forEach((t,i)=>{
    t.pos_x=startX+(i%4)*(TW+PAD_X);
    t.pos_y=transStartY+Math.floor(i/4)*(CARD_H+PAD_Y);
    pending[t.id]=true;
  });
}

// ── Mode 2: Grid (simple NxM grid) ──────────────────────────
function layoutGrid(ts){
  const cols=Math.ceil(Math.sqrt(ts.length*1.4));
  const PAD_X=90, PAD_Y=70; // Increased spacing for better readability
  ts.slice().sort((a,b)=>a.name.localeCompare(b.name)).forEach((t,i)=>{
    t.pos_x=60+(i%cols)*(TW+PAD_X);
    t.pos_y=60+Math.floor(i/cols)*(260+PAD_Y);
    pending[t.id]=true;
  });
}

// ── Mode 3: Radial (most-connected table in center) ──────────
function layoutRadial(ts){
  if(ts.length===1){ts[0].pos_x=300;ts[0].pos_y=300;pending[ts[0].id]=true;return;}
  // Count connections per table
  const conns={};
  ts.forEach(t=>{ conns[String(t.id)]=0; });
  ts.forEach(t=>gc(t.id).forEach(col=>{
    if(isFK(col)&&col.fk_table_id){
      conns[String(t.id)]=(conns[String(t.id)]||0)+1;
      conns[String(col.fk_table_id)]=(conns[String(col.fk_table_id)]||0)+1;
    }
  }));
  const sorted=[...ts].sort((a,b)=>(conns[String(b.id)]||0)-(conns[String(a.id)]||0));
  const center=sorted[0];
  const rest=sorted.slice(1);
  const cx=500, cy=400;
  center.pos_x=cx-TW/2; center.pos_y=cy-60;
  pending[center.id]=true;
  // Increased radius for better readability
  const R2=Math.max(350, rest.length*70);
  rest.forEach((t,i)=>{
    const angle=(2*Math.PI*i/rest.length)-Math.PI/2;
    t.pos_x=cx+R2*Math.cos(angle)-TW/2;
    t.pos_y=cy+R2*Math.sin(angle)-60;
    pending[t.id]=true;
  });
}

// ── Mode 4: By category (category groups side by side) ───────
function layoutCategory(ts){
  const PAD_X=100, PAD_Y=60, GROUP_GAP=140; // Increased spacing
  // Group by category
  const groups={};
  ts.forEach(t=>{
    const cid=String(t.category_id||'__none__');
    if(!groups[cid])groups[cid]=[];
    groups[cid].push(t);
  });
  let curX=60;
  Object.entries(groups).forEach(([,tbls])=>{
    const sorted=[...tbls].sort((a,b)=>a.name.localeCompare(b.name));
    sorted.forEach((t,i)=>{
      t.pos_x=curX;
      t.pos_y=60+i*(280+PAD_Y);
      pending[t.id]=true;
    });
    curX+=TW+PAD_X+GROUP_GAP;
  });
}

// ── Mode 5: Compact (tight packing, minimize overlap) ────────
function layoutCompact(ts){
  const PAD_X=50, PAD_Y=40; // Slightly increased for readability
  const cols=Math.ceil(Math.sqrt(ts.length));
  // Sort: most columns first (taller cards go left)
  const sorted=[...ts].sort((a,b)=>gc(b.id).length-gc(a.id).length);
  sorted.forEach((t,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    t.pos_x=60+col*(TW+PAD_X);
    t.pos_y=60+row*(200+PAD_Y);
    pending[t.id]=true;
  });
}

// ═══════════════════════════════════════════════════════════
// SAVE POSITIONS (debounced, fire-and-forget)
// ═══════════════════════════════════════════════════════════
let saveT=null;
function savePending(){
  clearTimeout(saveT);
  saveT=setTimeout(()=>{
    const ids=Object.keys(pending);pending={};
    ids.forEach(id=>{const t=S.tables.find(t=>String(t.id)===String(id));if(t)api('updateTable',{id:t.id,pos_x:t.pos_x,pos_y:t.pos_y}).catch(()=>{});});
  },550);
}
async function saveAll(){
  if(!S.schema){toast('Выберите схему','err');return;}
  const btn=document.getElementById('btn-save');btn.textContent='⏳';
  const ids=Object.keys(pending);pending={};
  await Promise.all(ids.map(id=>{const t=S.tables.find(t=>String(t.id)===String(id));return t?api('updateTable',{id:t.id,pos_x:t.pos_x,pos_y:t.pos_y}):Promise.resolve();}));
  btn.textContent='💾';toast('Сохранено','ok');
}

// ═══════════════════════════════════════════════════════════
// RIGHT PANEL
// ═══════════════════════════════════════════════════════════
function setupTabs(){
  document.querySelectorAll('.ptab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
      tab.classList.add('on');S.tab=tab.dataset.tab;renderPanel();
    });
  });
}
function renderPanel(){
  const b=document.getElementById('pbody');
  if(!S.table){b.innerHTML='<p class="sm" style="margin-top:20px;text-align:center">Выберите таблицу</p>';return;}
  if(S.tab==='props')renderProps(S.table,b);
  else if(S.tab==='cols')renderCols(S.table,b);
  else renderRelsPanel(S.table,b);
}

function renderRelsPanel(t,b){
  const outRels=S.columns.filter(c=>String(c.table_id)===String(t.id)&&isFK(c));
  const inRels=S.columns.filter(c=>isFK(c)&&String(c.fk_table_id)===String(t.id));
  let html=`<div style="font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Исходящие (FK → PK)</div>`;
  if(outRels.length){
    html+=outRels.map(c=>{
      const tgt=S.tables.find(t=>String(t.id)===String(c.fk_table_id));
      const tgtCol=S.columns.find(cc=>String(cc.id)===String(c.fk_column_id));
      return`<div class="rel-row" style="margin-bottom:4px">
        <div style="flex:1"><div style="font-size:11px;font-weight:700;color:var(--fk)">${esc(c.name)}</div><div class="sm">→ ${esc(tgt?.name||'?')}.${esc(tgtCol?.name||'?')}</div></div>
        <button class="rel-del" onclick="rmRel('${c.id}')" title="Удалить связь">✕</button>
      </div>`;
    }).join('');
  } else html+='<div class="sm" style="padding:4px 0">Нет исходящих связей</div>';

  html+=`<div style="font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px">Входящие (← FK из других)</div>`;
  if(inRels.length){
    html+=inRels.map(c=>{
      const src=S.tables.find(t=>String(t.id)===String(c.table_id));
      return`<div class="rel-row" style="margin-bottom:4px">
        <div style="flex:1"><div style="font-size:11px;font-weight:700;color:var(--accent)">${esc(src?.name||'?')}.${esc(c.name)}</div><div class="sm">→ эту таблицу</div></div>
      </div>`;
    }).join('');
  } else html+='<div class="sm" style="padding:4px 0">Нет входящих связей</div>';

  html+=`<div style="margin-top:12px"><button onclick="openRels()" style="width:100%;padding:6px;background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:5px;font-size:11px">🔗 Все связи схемы</button></div>`;
  b.innerHTML=html;
}

function renderProps(t,b){
  b.innerHTML=`
    <div class="fg"><label>Название</label><input id="pt-n" type="text" value="${ea(t.name)}" onchange="qsave()"/></div>
    <div class="fg"><label>Описание</label><textarea id="pt-d" onchange="qsave()">${esc(t.description||'')}</textarea></div>
    <div class="fg"><label>Категория</label><select id="pt-c" onchange="qsave()"><option value="">— нет —</option>${S.cats.map(c=>`<option value="${c.id}"${String(c.id)===String(t.category_id)?' selected':''}>${esc(c.name)}</option>`).join('')}</select></div>
    <div class="fg"><label>Назначение</label><select id="pt-a" onchange="qsave()"><option value="">— нет —</option>${S.asgs.map(a=>`<option value="${a.id}"${String(a.id)===String(t.assignment_id)?' selected':''}>${esc(a.name)}</option>`).join('')}</select></div>
    <button class="savebtn" onclick="qsave()">💾 Сохранить</button>
    <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
      <div class="sm">Позиция: X=${~~(t.pos_x||100)}, Y=${~~(t.pos_y||100)}</div>
      <div class="sm">Колонок: ${gc(t.id).length}</div>
      <div class="sm">Создана: ${fmtD(t.create_date_time)}</div>
    </div>
    <div style="display:flex;gap:6px;margin-top:10px">
      <button class="tb" style="flex:1" onclick="cpTable()">📋 Копия</button>
      <button class="tb danger" style="flex:1" onclick="delTable()">🗑 Удалить</button>
    </div>`;
}

// Optimistic save: update state immediately, API in background
function qsave(){
  const t=S.table;if(!t)return;
  const n=document.getElementById('pt-n')?.value||t.name;
  const d=document.getElementById('pt-d')?.value||'';
  const c=document.getElementById('pt-c')?.value||'';
  const a=document.getElementById('pt-a')?.value||'';
  t.name=n;t.description=d;t.category_id=c;t.assignment_id=a;
  R();
  api('updateTable',{id:t.id,name:n,description:d,category_id:c,assignment_id:a,pos_x:t.pos_x,pos_y:t.pos_y}).catch(e=>toast('Ошибка: '+e.message,'err'));
}

function renderCols(t,b){
  const cols=gc(t.id);
  const matched=S.tpls.filter(tpl=>!tpl.category_id||String(tpl.category_id)===String(t.category_id));
  const tplBtns=matched.length?`<div style="margin-top:9px;padding-top:9px;border-top:1px solid var(--border)"><div class="sm" style="font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Применить шаблон</div>${matched.map(tpl=>`<button onclick="applyTpl(${tpl.id})" style="width:100%;padding:4px 8px;background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:11px;text-align:left;display:flex;align-items:center;gap:6px;margin-bottom:2px" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'"><span style="width:6px;height:6px;border-radius:50%;background:${catColor(tpl.category_id)};flex-shrink:0"></span><span style="flex:1">${esc(tpl.name)}</span><span class="sm">${S.tcols.filter(c=>String(c.template_id)===String(tpl.id)).length} кол.</span></button>`).join('')}</div>`:'';

  b.innerHTML=`<ul class="col-list" id="col-list">${cols.map(c=>colItem(c)).join('')}</ul>
    <button class="addcol" onclick="openAddCol()">＋ Добавить колонку</button>
    ${tplBtns}
    <div style="margin-top:9px;padding-top:9px;border-top:1px solid var(--border)"><p class="sm">💡 Потяните оранжевый ● (FK-колонка) к PK-колонке другой таблицы</p></div>`;
  setupColDrag(cols);
}

function colItem(c){
  const ct=S.ctypes.find(t=>String(t.id)===String(c.type_id));
  const pk=isPK(c),fk=isFK(c),badge=pk?'PK':fk?'FK':(ct?ct.designation:'');
  const fkt=fk&&c.fk_table_id?`<span style="color:var(--fk);font-size:9px"> →${esc(S.tables.find(t=>String(t.id)===String(c.fk_table_id))?.name||'?')}</span>`:'';
  return `<li class="col-item" data-cid="${c.id}" draggable="true">
    <span class="cbadge ${pk?'pk':fk?'fk':''}">${esc(badge)}</span>
    <span class="cname">${esc(c.name)}${fkt}</span>
    <div class="cacts">
      <button onclick="openEditCol('${c.id}')">✏️</button>
      ${fk?`<button onclick="rmRel('${c.id}')" title="Удалить связь">🔗</button>`:''}
      <button class="del" onclick="delCol('${c.id}')">✕</button>
    </div></li>`;
}

function setupColDrag(cols){
  const list=document.getElementById('col-list');if(!list)return;
  let ds=null;
  list.querySelectorAll('.col-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{ds=item;item.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    item.addEventListener('dragend',  ()=>{item.classList.remove('dragging');reorderCols();});
    item.addEventListener('dragover', e=>{e.preventDefault();if(item!==ds){const r=item.getBoundingClientRect();list.insertBefore(ds,e.clientY<r.top+r.height/2?item:item.nextSibling);}});
  });
}
async function reorderCols(){
  const list=document.getElementById('col-list');if(!list)return;
  const order=[];
  list.querySelectorAll('.col-item').forEach((item,i)=>{order.push({id:item.dataset.cid,position:i+1});const c=S.columns.find(c=>String(c.id)===String(item.dataset.cid));if(c){c.position=i+1;inv(c.table_id);}});
  api('reorderColumns',{order}).catch(()=>{});
  R();
}
async function rmRel(colId){
  const col=S.columns.find(c=>String(c.id)===String(colId));if(!col)return;
  col.is_fk=false;col.fk_table_id='';col.fk_column_id='';inv(col.table_id);
  api('deleteRelation',{fk_column_id:colId}).catch(()=>{});
  toast('Связь удалена','ok');R();renderPanel();
}
