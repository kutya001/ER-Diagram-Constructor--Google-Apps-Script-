<script>// ═══════════════════════════════════════════════════════════
// INSTRUCTION (INTERACTIVE GUIDE & NOTES)
// ═══════════════════════════════════════════════════════════
let instEditMode=false;
const INST_KEY='er_instruction';
const DEFAULT_NOTES=`# Заметки проекта

Здесь вы можете вести технические записи о проекте, описывать нюансы вашей предметной области или хранить фрагменты кода. 
Эти заметки сохраняются в базе проекта.

- Заметка 1...
- Заметка 2...
`;

async function openInstruction(){
  instEditMode=false;
  document.getElementById('inst-edit-btn').style.display='inline-block';
  document.getElementById('inst-save-btn').style.display='none';
  showM('m-inst');
  switchInstTab('guide');
  
  // Load notes from backend or localStorage
  try{
    const raw=await api('getInstruction',{});
    const text=raw?.text||DEFAULT_NOTES;
    const upd=raw?.updated_at?`Обновлено: ${fmtD(raw.updated_at)}`:'';
    document.getElementById('inst-saved-at').textContent=upd;
    renderInstNotesView(text);
  }catch{
    const local=localStorage.getItem(INST_KEY)||DEFAULT_NOTES;
    renderInstNotesView(local);
    document.getElementById('inst-saved-at').textContent='(локальная копия)';
  }
}

function switchInstTab(t){
  const gTab=document.getElementById('itab-guide');
  const nTab=document.getElementById('itab-notes');
  if(gTab) gTab.className = 'inst-tab' + (t==='guide'?' on':'');
  if(nTab) nTab.className = 'inst-tab' + (t==='notes'?' on':'');
  
  const gView=document.getElementById('inst-guide-view');
  const nView=document.getElementById('inst-notes-view');
  if(gView) gView.style.display = t==='guide' ? 'block' : 'none';
  if(nView) nView.style.display = t==='notes' ? 'block' : 'none';
  
  if(t==='guide' && gView){
     gView.innerHTML = getGuideHTML();
     switchMiniTab('roadmap');
  }
}

function switchMiniTab(t){
  const tabs = document.querySelectorAll('.mtab');
  tabs.forEach(btn => btn.classList.remove('on'));
  const activeBtn = document.querySelector(`.mtab[data-tb="\${t}"]`);
  if(activeBtn) activeBtn.classList.add('on');
  
  const views = document.querySelectorAll('.mview');
  views.forEach(v => v.style.display = 'none');
  const activeView = document.getElementById(`minitab-\${t}`);
  if(activeView) activeView.style.display = 'block';
}

function getGuideHTML(){
  return `
    <div style="display:flex;gap:8px;margin-bottom:15px;border-bottom:1px solid var(--border);padding-bottom:10px;overflow-x:auto">
      <button class="mtab on" data-tb="roadmap" onclick="switchMiniTab('roadmap')">🗺 Роудмап</button>
      <button class="mtab" data-tb="basics" onclick="switchMiniTab('basics')">🎯 База</button>
      <button class="mtab" data-tb="rels" onclick="switchMiniTab('rels')">🔗 Связи</button>
      <button class="mtab" data-tb="sync" onclick="switchMiniTab('sync')">⚙️ Синхронизация</button>
      <button class="mtab" data-tb="ai" onclick="switchMiniTab('ai')">🤖 ИИ Промпты</button>
    </div>
    
    <div id="minitab-roadmap" class="mview">
      <div class="inst-card">
        <h4>🏁 Дорожная карта (Workflow)</h4>
        <p style="font-size:13px;color:var(--text);margin-bottom:15px">Конструктор ER Diagram предназначен для быстрого и визуально понятного проектирования баз данных. Вот рекомендованный порядок действий от старта до физической генерации таблиц:</p>
        <ol style="padding-left:20px;font-size:13px;line-height:2.0;color:var(--text)">
          <li><strong>Создайте проект (схему):</strong> В левой панели «Схемы БД» нажмите иконку «＋». Назовите новую схему (например, Market, CRM или App DB).</li>
          <li><strong>Сформируйте сущности:</strong> Кликните правой кнопкой мыши (ПКМ) по пустому пространству холста и выберите «Создать таблицу». Переименуйте ее (например, Users, Orders) кликнув на заголовок в карточке таблицы.</li>
          <li><strong>Настройте атрибуты (колонки):</strong> Выделите таблицу на холсте. В правой панели перейдите на вкладку «Колонки» и добавляйте поля с нужными типами данных: Строка (String), Число (Int), Булево (Boolean). Не забывайте указывать Primary Key для главных индексов (обычно колонка \`id\`).</li>
          <li><strong>Установите логические связи:</strong> Чтобы соединить данные, убедитесь, что в подчиненной таблице есть колонка со свойством Foreign Key (FK). Затем протяните коннектор от этой колонки-FK к Primary Key другой таблицы (см. раздел "Связи" для визуального примера).</li>
          <li><strong>Сгенерируйте SQL (опционально):</strong> Нажмите иконку «🗄 SQL» в верхнем меню, чтобы получить готовые скрипты создания таблиц для PostgreSQL, MySQL или SQLite.</li>
          <li><strong>Создайте физические листы в Google Таблицах:</strong> Если вы хотите использовать Google Spreadsheets как базу данных (например, для AppSheet или скриптов), откройте меню «🏗 Листы». Выберите таблицы и система автоматически сгенерирует вкладки-листы с прописанными заголовками.</li>
        </ol>
      </div>
    </div>

    <div id="minitab-basics" class="mview" style="display:none">
      <div class="inst-card">
        <h4>🎯 Основы управления и навигации</h4>
        <ul style="line-height:1.8">
          <li><strong>Перемещение (Pan):</strong> Зажмите ЛКМ на пустом месте холста и тяните. На тачпаде можно делать свайп двумя пальцами.</li>
          <li><strong>Масштаб (Zoom):</strong> Крутите колесико мыши от себя (приближение) или к себе (отдаление). Кнопки управления масштабом также доступны слева в верхнем баре (＋/－/⌖).</li>
          <li><strong>Кнопка ⌖ (Сфокусироваться):</strong> Автоматически подстраивает масштаб, чтобы все таблицы уместились в видимой области экрана.</li>
          <li><strong>Контекстное меню:</strong> Выполните правый клик (ПКМ) по карточке таблицы (копировать, удалить, изменить цвета).</li>
          <li><strong>Групповое выделение:</strong> Зажмите <code>Ctrl</code> (в Windows) или <code>Cmd</code> (в macOS) и поочередно кликайте по шапкам нужных таблиц. Синяя окантовка покажет выбранные таблицы. Вы сможете передвигать их всех сразу.</li>
          <li><strong>Мини-карта (Minimap):</strong> Размещена в правом нижнем углу и отображает миниатюру всей вашей схемы. Кликайте на нее для быстрого перемещения.</li>
          <li><strong>Режим «Дзен»:</strong> В верхнем баре есть кнопка с глазом (👁️), которая скрывает левую и правую панели, оставляя 100% экрана для рисования схем.</li>
        </ul>
      </div>
    </div>
    
    <div id="minitab-rels" class="mview" style="display:none">
      <div class="inst-card">
        <h4>🔗 Как правильно задавать связи (Foreign Key → Primary Key)</h4>
        <div style="background:var(--bg);padding:20px;border-radius:8px;margin:10px 0;display:flex;align-items:center;justify-content:center;gap:30px;min-height:120px;overflow:hidden;position:relative;border:1px dashed var(--border)">
          
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;width:140px;box-shadow:var(--shadow)">
            <div style="padding:6px;font-size:11px;font-weight:700;border-bottom:1px solid var(--border);background:var(--s2)">Таблица А (FK)</div>
            <div style="padding:6px;font-size:10px;display:flex;justify-content:space-between;align-items:center">
               <span>user_id</span>
               <span class="fk-drag-demo" style="width:10px;height:10px;background:var(--fk);border-radius:50%;display:inline-block;box-shadow:0 0 6px var(--fk)"></span>
            </div>
          </div>

          <svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none">
            <path class="demo-path" d="M 195 65 C 230 65, 220 65, 260 65" fill="none" stroke="var(--fk)" stroke-width="2" stroke-dasharray="4,4" />
            <circle class="demo-cursor" cx="195" cy="65" r="5" fill="#fff" stroke="var(--fk)" stroke-width="2" />
          </svg>

          <div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;width:140px;box-shadow:var(--shadow);position:relative;z-index:2">
            <div style="padding:6px;font-size:11px;font-weight:700;border-bottom:1px solid var(--border);background:var(--s2)">Таблица B (PK)</div>
            <div class="pk-drop-demo" style="padding:6px;font-size:10px;display:flex;gap:5px;align-items:center">
              <span style="color:var(--pk);font-weight:700">PK</span> <span>id</span>
            </div>
          </div>
        </div>
        <p style="font-size:13px;color:var(--text);line-height:1.6;margin-top:15px">
          <strong>Пошаговая настройка связей:</strong>
          <br>1. Выделите таблицу, которая "ссылается" на другую. 
          <br>2. В правой панели свойств зайдите в «Колонки», добавьте или выберите нужную колонку.
          <br>3. Поставьте галочку на свойствах <code>FK</code> у этой колонки (на карточке появится оранжевый кружок (порт)).
          <br>4. В таблице-источнике (на которую ссылаемся) обязательно должно быть поле с чекбоксом <code>PK</code> (Primary Key), оно обозначено красным круглым портом.
          <br>5. Соедините их! Наведите курсор на оранжевый порт FK, зажмите ЛКМ и тяните нить (path) к красному порту PK в другой таблице. Отпустите ЛКМ, когда появится уведомление привязки.
        </p>
      </div>
    </div>

    <div id="minitab-sync" class="mview" style="display:none">
      <div class="inst-card">
        <h4>⚙️ Синхронизация и работа с сервером</h4>
        <ul style="line-height:1.8">
          <li><strong>Умная синхронизация:</strong> Каждое добавление таблиц, свойств и перемещение элементов по экрану отслеживается локально и затем <em>оптимизированным пакетом отправляется на сервер</em>. Вы заметите это по зеленому флажку (галочке) рядом с кнопкой синхронизации. Если горит красный круг — идут изменения.</li>
          <li><strong>Ручная синхронизация:</strong> Если хотите принудительно обновить или "впушить" данные, нажмите кнопку ↺ в правом верхнем углу меню.</li>
          <li><strong>Детализация изменений:</strong> Возле кнопки синхронизации есть треугольник (▾). Раскройте его, чтобы посмотреть историю запросов (что именно отправлялось: Update Column, Move Node и т.д.).</li>
        </ul>
      </div>
    </div>
    
    <div id="minitab-ai" class="mview" style="display:none">
      <div class="inst-card">
        <h4>🤖 Максимизация эффективности через ИИ Промпты</h4>
        <p style="font-size:13px;color:var(--text);line-height:1.6;margin-bottom:10px">Вы можете использовать этот инструмент как прослойку перед ChatGPT/Claude/Deepseek, чтобы те проектировали структуру базы за вас.</p>
        <ul style="line-height:1.8">
          <li><strong>Экспорт структуры:</strong> Откройте модуль <strong>{ } JSON</strong> в верхнем меню. Там содержится "нативный язык конструктора".</li>
          <li><strong>🤖 Скопировать ИИ Промт:</strong> В самом низу JSON-меню есть зеленая кнопка. Она копирует специальный текст, включающий вашу текущую схему и жесткие инструкции (системный промпт) для LLM.</li>
          <li><strong>Вставка ответа:</strong> Отправьте текст ИИ. Попросите, например: <em>"Добавь модуль аутентификации из 3-х таблиц. Отвечай только JSON-файлом."</em>. Вставьте ответ LLM обратно в пустое окно импорта конструктора и нажмите Импорт. Модули сгенерируются визуально!</li>
        </ul>
      </div>
    </div>
    
    <style>
      .mtab { background:var(--s2); border:1px solid var(--border); color:var(--text); padding:5px 12px; border-radius:5px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
      .mtab:hover { border-color:var(--accent); color:var(--accent); }
      .mtab.on { background:var(--accent); color:#fff; border-color:var(--accent); }
      .demo-cursor { animation: demo-drag 2.5s infinite cubic-bezier(0.4, 0, 0.2, 1); }
      .demo-path { animation: demo-draw 2.5s infinite linear; }
      @keyframes demo-drag {
         0% { cx: 195; cy: 65; opacity: 0; transform:scale(1); }
         15% { opacity: 1; }
         70% { cx: 255; cy: 65; opacity: 1; transform:scale(1.2); }
         80% { opacity: 0; }
         100% { opacity: 0; }
      }
      @keyframes demo-draw {
         0% { stroke-dashoffset: 200; }
         100% { stroke-dashoffset: 0; }
      }
    </style>
  `;
}

function renderInstNotesView(text){
  const html=text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h4 style="margin:16px 0 6px;font-size:14px;color:var(--accent)">$1</h4>')
    .replace(/^## (.+)$/gm,'<h3 style="margin:18px 0 8px;font-size:15px;color:var(--text)">$1</h3>')
    .replace(/^# (.+)$/gm,'<h2 style="margin:0 0 16px;font-size:17px;color:var(--text);border-bottom:1px solid var(--border);padding-bottom:10px">$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`(.+?)`/g,'<code style="background:var(--s3);padding:2px 6px;border-radius:4px;font-size:12px;color:var(--accent)">$1</code>')
    .replace(/^- (.+)$/gm,'<li style="margin:4px 0;margin-left:20px;color:var(--t2)">$1</li>')
    .replace(/^(\d+)\. (.+)$/gm,'<li style="margin:4px 0;margin-left:20px;color:var(--t2)"><strong>$1.</strong> $2</li>')
    .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
  document.getElementById('inst-body').innerHTML=`<div style="line-height:1.7;font-size:13px">${html}</div>`;
}

function toggleInstEdit(){
  instEditMode=!instEditMode;
  const editBtn=document.getElementById('inst-edit-btn');
  const saveBtn=document.getElementById('inst-save-btn');
  if(instEditMode){
    editBtn.style.display='none';saveBtn.style.display='inline-block';
    const cur=document.getElementById('inst-body').innerText||DEFAULT_NOTES;
    api('getInstruction',{}).then(raw=>{
      const text=raw?.text||DEFAULT_NOTES;
      document.getElementById('inst-body').innerHTML=`<textarea id="inst-ta" style="width:100%;min-height:350px;background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:12px;font-size:13px;line-height:1.7;resize:vertical;font-family:inherit" spellcheck="false">${text}</textarea>`;
    }).catch(()=>{
      const text=localStorage.getItem(INST_KEY)||DEFAULT_NOTES;
      document.getElementById('inst-body').innerHTML=`<textarea id="inst-ta" style="width:100%;min-height:350px;background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:12px;font-size:13px;line-height:1.7;resize:vertical;font-family:inherit" spellcheck="false">${text}</textarea>`;
    });
  }else{
    editBtn.style.display='inline-block';saveBtn.style.display='none';
    const ta=document.getElementById('inst-ta');
    if(ta)renderInstNotesView(ta.value);
  }
}

async function saveInstruction(){
  const ta=document.getElementById('inst-ta');
  if(!ta){toast('Нечего сохранять','err');return;}
  const text=ta.value;
  localStorage.setItem(INST_KEY,text);
  try{
    await api('saveInstruction',{text});
    toast('Заметки сохранены','ok');
  }catch{toast('Сохранено локально','inf');}
  instEditMode=false;
  document.getElementById('inst-edit-btn').style.display='inline-block';
  document.getElementById('inst-save-btn').style.display='none';
  document.getElementById('inst-saved-at').textContent=`Обновлено: ${fmtD(new Date().toISOString())}`;
  renderInstNotesView(text);
}
</script>
