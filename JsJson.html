<script>
// ═══════════════════════════════════════════════════════════
// JSON / AI — multi-tab: export, import, AI prompt, system dump
// ═══════════════════════════════════════════════════════════
let jData=null, jTab='export', sysDump=null;
let aceEditors={};

function initAce(id, mode='json', readonly=false){
  if(!window.ace)return null;
  const el=document.getElementById(id);
  if(!el)return null;
  
  // Clean up existing editor if any
  if(aceEditors[id]){
    try{aceEditors[id].destroy();aceEditors[id].container.remove();}catch(e){}
  }

  const theme = curTheme === 'dark' ? 'ace/theme/monokai' : (curTheme === 'warm' ? 'ace/theme/tomorrow_night_eighties' : 'ace/theme/chrome');
  const editor = ace.edit(id);
  editor.setTheme(theme);
  editor.session.setMode("ace/mode/" + mode);
  editor.setReadOnly(readonly);
  editor.setOptions({
    fontSize: "12px",
    showPrintMargin: false,
    useSoftTabs: true,
    tabSize: 2,
    wrap: true,
    fontFamily: "'Consolas', 'Monaco', 'Menlo', 'Ubuntu Mono', monospace"
  });
  aceEditors[id] = editor;
  return editor;
}

function getAceVal(id){return aceEditors[id] ? aceEditors[id].getValue() : '';}
function setAceVal(id, val){if(aceEditors[id]) aceEditors[id].setValue(val, -1);}

const AI_PROMPT_TEMPLATE = `# ER Diagram Constructor — AI JSON Schema Builder
# Версия: 1.0 | Используй этот промт для генерации схем БД в JSON формате

## Инструкция для ИИ
Ты — помощник по проектированию баз данных. Твоя задача — генерировать JSON схемы
в строгом формате для импорта в ER Diagram Constructor.

## Формат JSON схемы (СТРОГО соблюдай структуру)

\`\`\`json
{
  "schema": {
    "name": "Название схемы",
    "description": "Описание схемы"
  },
  "tables": [
    {
      "name": "table_name",
      "description": "Описание таблицы",
      "category": "Название категории (опционально)",
      "assignment": "Назначение (опционально)",
      "position": { "x": 60, "y": 60 },
      "columns": [
        {
          "name": "id",
          "description": "Первичный ключ",
          "type": "pk",
          "is_pk": true,
          "is_fk": false
        },
        {
          "name": "name",
          "description": "Название",
          "type": "str",
          "is_pk": false,
          "is_fk": false
        },
        {
          "name": "category_id",
          "description": "Ссылка на категорию",
          "type": "fk",
          "is_pk": false,
          "is_fk": true,
          "fk_table": "categories",
          "fk_column": "id"
        }
      ]
    }
  ]
}
\`\`\`

## Допустимые типы колонок (поле "type")
| type       | Описание                        |
|------------|---------------------------------|
| pk         | Первичный ключ (AUTO INCREMENT) |
| fk         | Внешний ключ                    |
| int        | Целое число                     |
| bigint     | Большое целое                   |
| float      | Число с плавающей точкой        |
| bool       | Булево (true/false)             |
| str        | Строка (VARCHAR)                |
| text       | Длинный текст                   |
| date       | Дата                            |
| time       | Время                           |
| datetime   | Дата и время                    |
| uuid       | UUID                            |
| json       | JSON объект                     |

## Правила
1. Каждая таблица ДОЛЖНА иметь ровно одну колонку с type="pk"
2. FK-колонки: укажи fk_table (имя таблицы) и fk_column (обычно "id")
3. Позиции (position.x, position.y): располагай таблицы в сетке с шагом 280×220
4. Названия таблиц и колонок: snake_case, только латиница
5. Не добавляй лишних полей — только те что в формате выше

## Пример запроса
"Создай схему для интернет-магазина с таблицами: товары, категории, пользователи, заказы, позиции заказа"

## Системные справочники (доступные категории и назначения)
{{SYSTEM_DATA}}

## Текущая схема (для контекста)
{{CURRENT_SCHEMA}}
`;

function openJson(){
  jData=null;sysDump=null;
  const title=S.schema?`{ } JSON · ${S.schema.name}`:'{ } JSON / Импорт';
  document.getElementById('json-title').textContent=title;
  // If no schema active — open import tab directly
  const startTab=S.schema?'export':'import';
  // Hide export tab if no schema
  document.querySelectorAll('.json-tab').forEach(el=>{
    const isExport=el.dataset.jt==='export';
    el.style.opacity=(isExport&&!S.schema)?'0.35':'1';
    el.style.pointerEvents=(isExport&&!S.schema)?'none':'';
    el.title=(isExport&&!S.schema)?'Выберите схему для экспорта':'';
  });
  switchJsonTab(startTab);
  showM('m-json');
}

function switchJsonTab(t){
  jTab=t;
  document.querySelectorAll('.json-tab').forEach(el=>el.classList.toggle('on',el.dataset.jt===t));
  if(t==='export')renderJsonExport();
  else if(t==='import')renderJsonImport();
  else if(t==='ai')renderJsonAI();
  else renderJsonSys();
}

// ── EXPORT tab ───────────────────────────────────────────────
async function renderJsonExport(){
  const b=document.getElementById('json-tab-body');
  b.innerHTML='<div style="text-align:center;padding:20px;color:var(--t2)">⏳ Загрузка…</div>';
  try{
    if(SQ.length>0||syncRunning){
      b.innerHTML='<div style="text-align:center;padding:20px;color:var(--accent)">⏳ Синхронизация изменений…</div>';
      await syncNow();
    }
    jData=await api('exportSchemaJson',{schema_id:S.schema.id});
    const meta=[{l:'Таблиц',v:jData.meta.table_count},{l:'Колонок',v:jData.meta.column_count},{l:'Связей',v:jData.meta.relation_count}];
    b.innerHTML=`
      <div style="display:flex;gap:7px;align-items:center;flex-shrink:0">
        ${meta.map(m=>`<div style="padding:4px 12px;background:var(--s2);border:1px solid var(--border);border-radius:6px;text-align:center">
          <span style="font-size:14px;font-weight:700;color:var(--accent)">${m.v}</span> <span class="sm">${m.l}</span></div>`).join('')}
        <div style="margin-left:auto;font-size:11px;color:var(--t2)">💡 Вы можете редактировать JSON ниже и сохранить изменения</div>
      </div>
      <div id="json-editor-export" style="flex:1;border:1px solid var(--border);border-radius:6px;min-height:200px"></div>
      <div style="display:flex;gap:7px;flex-shrink:0">
        <button onclick="applyJsonChanges()" style="flex:1.5;padding:8px;background:var(--green);color:#fff;border-radius:5px;font-weight:600;font-size:12px;border:none">💾 Применить изменения</button>
        <button onclick="copyJsonExport()" style="flex:1;padding:8px;background:var(--accent);color:#fff;border-radius:5px;font-weight:600;font-size:12px;border:none">📋 Копировать</button>
        <button onclick="dlJson()" style="flex:1;padding:8px;background:var(--s2);color:var(--text);border:1px solid var(--border);border-radius:5px;font-weight:600;font-size:12px">⬇ Скачать</button>
      </div>`;
    const ed = initAce('json-editor-export', 'json');
    if(ed) ed.setValue(JSON.stringify(jData, null, 2), -1);
  }catch(e){b.innerHTML=`<div style="color:var(--red)">Ошибка: ${esc(e.message)}</div>`;}
}

async function applyJsonChanges(){
  const val = getAceVal('json-editor-export');
  if(!val)return;
  let j;
  try{j=JSON.parse(val);}catch(e){toast('Ошибка JSON: '+e.message,'err');return;}
  
  if(!j.schema || !Array.isArray(j.tables)){toast('Неверная структура JSON','err');return;}
  
  const ok = await conf('Обновить текущую схему?','Все существующие таблицы будут заменены данными из JSON.', async ()=>{
    try{
      toast('Применяем изменения…','inf');
      await api('importSchemaJson',{json:j, overwrite: true});
      await loadAll();
      inv();
      if(S.schema) selSchema(String(S.schema.id));
      toast('Схема обновлена','ok');
      renderJsonExport(); // Refresh meta and editor
    }catch(e){toast('Ошибка: '+e.message,'err');}
  });
}

function copyJsonExport(){
  const t = getAceVal('json-editor-export') || JSON.stringify(jData, null, 2);
  if(!t)return;
  (navigator.clipboard?.writeText(t)||Promise.reject())
    .then(()=>toast('Скопировано','ok'))
    .catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Скопировано','ok');});
}
// Legacy alias
function copyJson(){copyJsonExport();}

function dlJson(){
  const t = getAceVal('json-editor-export') || JSON.stringify(jData, null, 2);
  if(!t)return;
  const n=(S.schema?.name||'schema').replace(/[^\w\u0400-\u04FF]/g,'_');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([t],{type:'application/json'}));
  a.download=`${n}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('Скачан','ok');
}

// ── IMPORT tab ───────────────────────────────────────────────
function renderJsonImport(){
  const b=document.getElementById('json-tab-body');
  b.innerHTML=`
    <div style="background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:12px;flex-shrink:0">
      <div style="font-size:12px;font-weight:700;margin-bottom:8px;color:var(--accent)">📥 Импорт схемы из JSON</div>
      <p class="sm" style="margin-bottom:10px">Вставьте JSON схему (от ИИ или экспортированный файл). Система автоматически создаст все таблицы, колонки и связи.</p>
      <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer">
          <input type="checkbox" id="imp-overwrite"> Перезаписать если схема существует
        </label>
        <button onclick="document.getElementById('imp-file').click()" style="padding:4px 11px;background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:11px">📁 Загрузить .json файл</button>
        <input type="file" id="imp-file" accept=".json,application/json" style="display:none" onchange="loadJsonFile(event)">
      </div>
    </div>
    <div id="ace-import" style="flex:1;min-height:200px;border:1px solid var(--border);border-radius:6px"></div>
    <div style="background:#5b8dee11;border:1px solid #5b8dee44;border-radius:7px;padding:10px;flex-shrink:0">
      <div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:5px">💡 Как использовать с ИИ</div>
      <ol style="font-size:11px;color:var(--t2);padding-left:18px;line-height:1.8">
        <li>Перейдите на вкладку <strong style="color:var(--text)">🤖 ИИ Промт</strong> и скопируйте промт</li>
        <li>Вставьте промт в ChatGPT / Claude / Gemini с вашим описанием схемы</li>
        <li>Скопируйте JSON-ответ ИИ и вставьте сюда</li>
        <li>Нажмите <strong style="color:var(--text)">Импортировать</strong></li>
      </ol>
    </div>
    <div style="display:flex;gap:7px;flex-shrink:0">
      <button onclick="validateImportJson()" style="flex:1;padding:9px;background:var(--s2);color:var(--text);border:1px solid var(--border);border-radius:5px;font-weight:600;font-size:12px">✓ Проверить JSON</button>
      <button onclick="doImportJson()" style="flex:2;padding:9px;background:var(--accent);color:#fff;border-radius:5px;font-weight:600;font-size:12px">📥 Импортировать схему</button>
    </div>
    <div id="imp-status"></div>
  `;
  initAce('ace-import', 'json');
}

function loadJsonFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      setAceVal('ace-import', JSON.stringify(parsed,null,2));
      toast('Файл загружен','ok');
    }catch{toast('Ошибка парсинга JSON','err');}
  };
  reader.readAsText(file);
}

function validateImportJson(){
  const raw=getAceVal('ace-import').trim();
  const st=document.getElementById('imp-status');
  if(!raw){st.innerHTML='<div style="color:var(--red);margin-top:8px;font-size:12px">⚠ Вставьте JSON</div>';return;}
  try{
    const j=JSON.parse(raw);
    if(!j.schema||!j.schema.name){st.innerHTML='<div style="color:var(--red);margin-top:8px;font-size:12px">✗ Отсутствует schema.name</div>';return;}
    if(!Array.isArray(j.tables)){st.innerHTML='<div style="color:var(--red);margin-top:8px;font-size:12px">✗ Отсутствует массив tables</div>';return;}
    const tCount=j.tables.length;
    const cCount=j.tables.reduce((s,t)=>s+(t.columns||[]).length,0);
    const relCount=j.tables.reduce((s,t)=>s+(t.columns||[]).filter(c=>c.is_fk).length,0);
    st.innerHTML=`<div style="margin-top:8px;padding:8px 12px;background:#27ae6022;border:1px solid #27ae6066;border-radius:5px;font-size:12px;color:#60f0a0">
      ✓ JSON валидный — Схема: <strong>${esc(j.schema.name)}</strong> · ${tCount} таблиц · ${cCount} колонок · ${relCount} связей
    </div>`;
  }catch(e){
    st.innerHTML=`<div style="color:var(--red);margin-top:8px;font-size:12px">✗ Ошибка парсинга: ${esc(e.message)}</div>`;
  }
}

async function doImportJson(){
  const raw=getAceVal('ace-import').trim();
  const overwrite=document.getElementById('imp-overwrite')?.checked;
  if(!raw){toast('Вставьте JSON','err');return;}
  let j;
  try{j=JSON.parse(raw);}catch(e){toast('Ошибка JSON: '+e.message,'err');return;}
  if(!j.schema||!Array.isArray(j.tables)){toast('Неверный формат JSON','err');return;}
  const st=document.getElementById('imp-status');
  st.innerHTML='<div style="margin-top:8px;color:var(--accent);font-size:12px"><span class="sync-spin">↻</span> Импорт схемы…</div>';
  try{
    const r=await api('importSchemaJson',{json:j,overwrite});
    // Reload all data
    await loadAll();
    inv();
    // Select new schema
    selSchema(String(r.schema_id));
    closeM('m-json');
    toast(`Схема «${r.schema_name}» импортирована: ${r.tables_count} таблиц`,'ok');
  }catch(e){
    st.innerHTML=`<div style="color:var(--red);margin-top:8px;font-size:12px">✗ Ошибка: ${esc(e.message)}</div>`;
    toast('Ошибка импорта: '+e.message,'err');
  }
}

// ── AI PROMPT tab ─────────────────────────────────────────────
async function renderJsonAI(){
  const b=document.getElementById('json-tab-body');
  b.innerHTML=`
    <div style="background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:12px;flex-shrink:0">
      <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:5px">🤖 Промт для ИИ-помощников</div>
      <p class="sm">Скопируйте этот промт и вставьте в ChatGPT, Claude, Gemini или другой ИИ вместе с описанием вашей схемы. ИИ вернёт готовый JSON для импорта.</p>
    </div>
    <div id="ace-ai-prompt" style="flex:1;min-height:300px;border:1px solid var(--border);border-radius:6px"></div>
    <div style="display:flex;gap:7px;flex-shrink:0">
      <button onclick="copyAiPrompt()" style="flex:1;padding:9px;background:var(--accent);color:#fff;border-radius:5px;font-weight:600;font-size:12px">📋 Копировать промт</button>
      <button onclick="buildAiPromptWithSchema()" style="padding:9px 14px;background:var(--s2);color:var(--text);border:1px solid var(--border);border-radius:5px;font-size:12px">↻ Обновить</button>
    </div>
    <div style="background:#f39c1211;border:1px solid #f39c1244;border-radius:7px;padding:10px;font-size:11px;color:var(--t2);flex-shrink:0">
      <strong style="color:var(--orange)">💡 Совет:</strong> После получения JSON от ИИ — перейдите на вкладку <strong style="color:var(--text)">📥 Импорт JSON</strong> и вставьте ответ туда.
    </div>
  `;
  const ed = initAce('ace-ai-prompt', 'markdown', true);
  buildAiPromptWithSchema();
}

async function buildAiPromptWithSchema(){
  if(!aceEditors['ace-ai-prompt'])return;
  setAceVal('ace-ai-prompt', '⏳ Подготовка промта…');
  try{
    if(SQ.length>0||syncRunning) await syncNow();
    
    // Refresh jData if needed for context
    if(S.schema && !jData) {
      jData = await api('exportSchemaJson',{schema_id:S.schema.id});
    }
    
    // Gather system data for context
    const sysData={
      categories: S.cats.map(c=>({id:c.id,name:c.name})),
      assignments: S.asgs.map(a=>({id:a.id,name:a.name})),
      column_types: S.ctypes.map(t=>({designation:t.designation,name:t.name,description:t.description||''})),
    };
    let currentSchemaStr='(схема не выбрана)';
    if(S.schema && jData){
      currentSchemaStr=JSON.stringify({schema:jData.schema,meta:jData.meta,table_names:jData.tables.map(t=>t.name)},null,2);
    } else if(S.schema){
      currentSchemaStr=`Схема: ${S.schema.name} (${schTables().length} таблиц)`;
    }
    const prompt=AI_PROMPT_TEMPLATE
      .replace('{{SYSTEM_DATA}}',JSON.stringify(sysData,null,2))
      .replace('{{CURRENT_SCHEMA}}',currentSchemaStr);
    setAceVal('ace-ai-prompt', prompt);
  }catch(e){setAceVal('ace-ai-prompt', 'Ошибка: '+e.message);}
}

function copyAiPrompt(){
  const t = getAceVal('ace-ai-prompt');
  if(!t)return;
  (navigator.clipboard?.writeText(t)||Promise.reject())
    .then(()=>toast('Промт скопирован','ok'))
    .catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Скопировано','ok');});
}

// ── SYSTEM DATA tab ───────────────────────────────────────────
async function renderJsonSys(){
  const b=document.getElementById('json-tab-body');
  b.innerHTML='<div style="text-align:center;padding:20px;color:var(--t2)">⏳ Загрузка системных данных…</div>';
  try{
    const raw=await api('getSystemDump',{});
    sysDump=Array.isArray(raw)?raw:(raw&&raw.data?raw.data:raw);
    b.innerHTML=`
      <div style="background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:12px;flex-shrink:0">
        <div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:5px">🗄 Системные справочники и данные</div>
        <p class="sm">Полный дамп всех системных таблиц — полезен для передачи ИИ полного контекста системы.</p>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0" id="sys-tab-btns">
        ${Object.keys(sysDump||{}).map(k=>`<button onclick="showSysTable('${k}')" class="sys-tab-btn" data-sk="${k}" style="padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;background:var(--s2);color:var(--t2);border:1px solid var(--border)">${k}</button>`).join('')}
      </div>
      <div id="sys-data-view" style="flex:1;overflow-y:auto;min-height:0"></div>
      <div style="display:flex;gap:7px;flex-shrink:0">
        <button onclick="copySysDump()" style="flex:1;padding:8px;background:var(--s2);color:var(--text);border:1px solid var(--border);border-radius:5px;font-weight:600;font-size:12px">📋 Копировать весь дамп JSON</button>
        <button onclick="dlSysDump()" style="flex:1;padding:8px;background:var(--s2);color:var(--text);border:1px solid var(--border);border-radius:5px;font-weight:600;font-size:12px">⬇ Скачать system_dump.json</button>
      </div>
    `;
    // Show first table by default
    const keys=Object.keys(sysDump||{});
    if(keys.length)showSysTable(keys[0]);
  }catch(e){b.innerHTML=`<div style="color:var(--red);padding:12px">Ошибка: ${esc(e.message)}</div>`;}
}

function showSysTable(key){
  document.querySelectorAll('.sys-tab-btn').forEach(b=>{
    b.style.background=b.dataset.sk===key?'var(--accent)':'var(--s2)';
    b.style.color=b.dataset.sk===key?'#fff':'var(--t2)';
  });
  const rows=sysDump?sysDump[key]:[];
  const el=document.getElementById('sys-data-view');
  if(!el)return;
  if(!rows||!rows.length){el.innerHTML=`<div class="sm" style="padding:8px">Нет данных в "${key}"</div>`;return;}
  const headers=Object.keys(rows[0]);
  const isDateCol=h=>h==='create_date_time'||h==='update_date_time'||h.endsWith('_at')||h.endsWith('_date');
  const fmtCell=(h,v)=>{
    if(!v)return'—';
    if(isDateCol(h))return fmtD(v);
    return String(v);
  };
  el.innerHTML=`<div style="overflow-x:auto;max-height:36vh;margin-top:4px">
    <table class="dpreview">
      <thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r=>`<tr>${headers.map(h=>{
        const raw=r[h]??'';
        const disp=fmtCell(h,raw);
        return`<td title="${ea(String(raw))}">${esc(disp)}</td>`;
      }).join('')}</tr>`).join('')}</tbody>
    </table>
  </div><div class="sm" style="margin-top:5px;padding:2px 4px">${rows.length} строк в "${key}"</div>`;
}

function copySysDump(){
  if(!sysDump)return;
  const t=JSON.stringify(sysDump,null,2);
  (navigator.clipboard?.writeText(t)||Promise.reject()).then(()=>toast('Дамп скопирован','ok')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Скопировано','ok');
  });
}
function dlSysDump(){
  if(!sysDump)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(sysDump,null,2)],{type:'application/json'}));
  a.download='system_dump.json';document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('Скачан','ok');
}
</script>
<script>
// ═══════════════════════════════════════════════════════════
// SQL Import/Export — PostgreSQL, MSSQL, MySQL, SQLite
// ═══════════════════════════════════════════════════════════
let sqlTab='export', sqlData=null;

function openSql(){
  sqlData=null;
  const title=S.schema?`🗄 SQL · ${S.schema.name}`:'🗄 SQL Импорт';
  document.getElementById('sql-title').textContent=title;
  // Hide export tab if no schema
  document.querySelectorAll('.sql-tab').forEach(el=>{
    const isExport=el.dataset.st==='export';
    el.style.opacity=(isExport&&!S.schema)?'0.35':'1';
    el.style.pointerEvents=(isExport&&!S.schema)?'none':'';
    el.title=(isExport&&!S.schema)?'Выберите схему для экспорта':'';
  });
  switchSqlTab(S.schema?'export':'import');
  showM('m-sql');
}

function switchSqlTab(t){
  sqlTab=t;
  document.querySelectorAll('.sql-tab').forEach(el=>el.classList.toggle('on',el.dataset.st===t));
  if(t==='export')renderSqlExport();
  else renderSqlImport();
}

// ── EXPORT tab ───────────────────────────────────────────────
async function renderSqlExport(){
  const b=document.getElementById('sql-tab-body');
  b.innerHTML='<div style="text-align:center;padding:20px;color:var(--t2)">⏳ Загрузка…</div>';
  try{
    sqlData=await api('exportSchemaSql',{schema_id:S.schema.id});
    const meta=[{l:'Таблиц',v:sqlData.meta.table_count},{l:'Колонок',v:sqlData.meta.column_count},{l:'Связей',v:sqlData.meta.relation_count}];
    b.innerHTML=`
      <div style="background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:12px;flex-shrink:0">
        <div style="font-size:12px;font-weight:700;margin-bottom:8px;color:var(--accent)">📤 Экспорт SQL схемы</div>
        <p class="sm" style="margin-bottom:10px">Генерация DDL скриптов для различных СУБД. Выберите диалект и скопируйте или скачайте результат.</p>
        <div style="display:flex;gap:9px;flex-wrap:wrap;flex-shrink:0">
          ${meta.map(m=>`<div style="padding:5px 14px;background:var(--s3);border:1px solid var(--border);border-radius:6px;text-align:center">
            <div style="font-size:17px;font-weight:700;color:var(--accent)">${m.v}</div><div class="sm">${m.l}</div></div>`).join('')}
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600">
          <span>Диалект SQL:</span>
          <select id="sql-dialect" onchange="renderSqlDialect()" style="padding:5px 10px;background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:5px;font-size:12px">
            <option value="postgresql">PostgreSQL</option>
            <option value="mssql">MS SQL Server</option>
            <option value="mysql">MySQL / MariaDB</option>
            <option value="sqlite">SQLite</option>
          </select>
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600">
          <input type="checkbox" id="sql-drop" style="width:15px;height:15px;accent-color:var(--accent)" onchange="renderSqlDialect()"/> DROP TABLE IF EXISTS
        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600">
          <input type="checkbox" id="sql-fk" checked style="width:15px;height:15px;accent-color:var(--accent)" onchange="renderSqlDialect()"/> FOREIGN KEY constraints
        </label>
      </div>
      <div id="ace-sql-out" style="flex:1;min-height:200px;border:1px solid var(--border);border-radius:6px"></div>
      <div style="display:flex;gap:7px;flex-shrink:0">
        <button onclick="copySqlExport()" style="flex:1;padding:8px;background:var(--accent);color:#fff;border-radius:5px;font-weight:600;font-size:12px">📋 Копировать SQL</button>
        <button onclick="dlSql()" style="flex:1;padding:8px;background:var(--s2);color:var(--text);border:1px solid var(--border);border-radius:5px;font-weight:600;font-size:12px">⬇ Скачать .sql</button>
      </div>`;
    renderSqlDialect();
  }catch(e){b.innerHTML=`<div style="color:var(--red)">Ошибка: ${esc(e.message)}</div>`;}
}

function renderSqlDialect(){
  const dialect=document.getElementById('sql-dialect').value;
  const withDrop=document.getElementById('sql-drop').checked;
  const withFk=document.getElementById('sql-fk').checked;
  const out=document.getElementById('sql-out');
  if(!out||!sqlData)return;
  
  const ddl=sqlData.dialects[dialect]||sqlData.dialects.postgresql;
  let result=ddl;
  
  // Add DROP statements if requested
  if(withDrop){
    const dropStmts=sqlData.tables.map(t=>{
      if(dialect==='mssql')return`IF OBJECT_ID('[${t.name}]', 'U') IS NOT NULL DROP TABLE [${t.name}];`;
      if(dialect==='mysql')return`DROP TABLE IF EXISTS \`${t.name}\`;`;
      if(dialect==='sqlite')return`DROP TABLE IF EXISTS "${t.name}";`;
      return`DROP TABLE IF EXISTS "${t.name}";`;
    }).join('\n');
    result=dropStmts+'\n\n'+result;
  }
  
  const ed = initAce('ace-sql-out', 'sql', true);
  if(ed) ed.setValue(result, -1);
}

function copySqlExport(){
  const txt=document.querySelector('#sql-out textarea');
  if(!txt)return;
  const t=txt.value;
  (navigator.clipboard?.writeText(t)||Promise.reject())
    .then(()=>toast('SQL скопирован','ok'))
    .catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Скопировано','ok');});
}

function dlSql(){
  const txt=document.querySelector('#sql-out textarea');
  if(!txt)return;
  const dialect=document.getElementById('sql-dialect').value;
  const n=(S.schema?.name||'schema').replace(/[^\w\u0400-\u04FF]/g,'_');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt.value],{type:'application/sql'}));
  a.download=`${n}_${dialect}.sql`;document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('Скачан','ok');
}

// ── IMPORT tab ───────────────────────────────────────────────
function renderSqlImport(){
  const b=document.getElementById('sql-tab-body');
  b.innerHTML=`
    <div style="background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:12px;flex-shrink:0">
      <div style="font-size:12px;font-weight:700;margin-bottom:8px;color:var(--accent)">📥 Импорт из SQL DDL</div>
      <p class="sm" style="margin-bottom:10px">Вставьте CREATE TABLE скрипт. Система попытается распарсить структуру и создать таблицы.</p>
      <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer">
          <span>Диалект:</span>
          <select id="imp-sql-dialect" style="padding:4px 8px;background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:11px">
            <option value="postgresql">PostgreSQL</option>
            <option value="mssql">MS SQL Server</option>
            <option value="mysql">MySQL / MariaDB</option>
            <option value="sqlite">SQLite</option>
            <option value="auto">Авто-определение</option>
          </select>
        </label>
        <button onclick="document.getElementById('imp-sql-file').click()" style="padding:4px 11px;background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:11px">📁 Загрузить .sql файл</button>
        <input type="file" id="imp-sql-file" accept=".sql" style="display:none" onchange="loadSqlFile(event)">
      </div>
    </div>
    <div id="ace-sql-import" style="flex:1;min-height:200px;border:1px solid var(--border);border-radius:6px"></div>
    <div style="background:#5b8dee11;border:1px solid #5b8dee44;border-radius:7px;padding:10px;flex-shrink:0">
      <div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:5px">💡 Поддерживаемые конструкции</div>
      <ul style="font-size:11px;color:var(--t2);padding-left:18px;line-height:1.8">
        <li>CREATE TABLE с колонками и типами данных</li>
        <li>PRIMARY KEY, FOREIGN KEY, UNIQUE, NOT NULL</li>
        <li>DEFAULT значения, CHECK ограничения</li>
        <li>COMMENTS / описания колонок</li>
      </ul>
    </div>
    <div style="display:flex;gap:7px;flex-shrink:0">
      <button onclick="validateImportSql()" style="flex:1;padding:9px;background:var(--s2);color:var(--text);border:1px solid var(--border);border-radius:5px;font-weight:600;font-size:12px">✓ Проверить SQL</button>
      <button onclick="doImportSql()" style="flex:2;padding:9px;background:var(--accent);color:#fff;border-radius:5px;font-weight:600;font-size:12px">📥 Импортировать схему</button>
    </div>
    <div id="imp-sql-status"></div>
  `;
  initAce('ace-sql-import', 'sql');
}

function loadSqlFile(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    setAceVal('ace-sql-import', ev.target.result);
    toast('Файл загружен','ok');
  };
  reader.readAsText(file);
}

function validateImportSql(){
  const raw=getAceVal('ace-sql-import').trim();
  const st=document.getElementById('imp-sql-status');
  if(!raw){st.innerHTML='<div style="color:var(--red);margin-top:8px;font-size:12px">⚠ Вставьте SQL</div>';return;}
  
  // Simple validation - count CREATE TABLE statements
  const createCount=(raw.match(/CREATE\s+TABLE/ig)||[]).length;
  if(createCount===0){
    st.innerHTML='<div style="color:var(--red);margin-top:8px;font-size:12px">✗ Не найдено CREATE TABLE语句</div>';
    return;
  }
  
  st.innerHTML=`<div style="margin-top:8px;padding:8px 12px;background:#27ae6022;border:1px solid #27ae6066;border-radius:5px;font-size:12px;color:#60f0a0">
    ✓ Найдено таблиц: <strong>${createCount}</strong>. Нажмите "Импортировать схему" для создания.
  </div>`;
}

async function doImportSql(){
  const raw=getAceVal('ace-sql-import').trim();
  const dialect=document.getElementById('imp-sql-dialect').value;
  if(!raw){toast('Вставьте SQL','err');return;}
  
  const st=document.getElementById('imp-sql-status');
  st.innerHTML='<div style="margin-top:8px;color:var(--accent);font-size:12px"><span class="sync-spin">↻</span> Парсинг SQL…</div>';
  try{
    const r=await api('importSchemaSql',{sql:raw,dialect});
    await loadAll();
    inv();
    selSchema(String(r.schema_id));
    closeM('m-sql');
    toast(`Схема «${r.schema_name}» импортирована: ${r.tables_count} таблиц`,'ok');
  }catch(e){
    st.innerHTML=`<div style="color:var(--red);margin-top:8px;font-size:12px">✗ Ошибка: ${esc(e.message)}</div>`;
    toast('Ошибка импорта: '+e.message,'err');
  }
}
</script>
