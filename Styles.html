<style>
/* ════════════════════════ THEMES ═══════════════════════════ */
:root,[data-theme="dark"]{
  --bg:#1a1d27;--surface:#252836;--s2:#2d3147;--s3:#353a55;
  --accent:#5b8dee;--a2:#7c5cbf;--green:#27ae60;--red:#e74c3c;
  --orange:#f39c12;--text:#e8eaf6;--t2:#9da5c9;--border:#3d4266;
  --shadow:0 4px 20px rgba(0,0,0,.45);--pk:#f1c40f;--fk:#e67e22;
  --canvas-bg:#1a1d27;--grid:rgba(255,255,255,.03);
  --tb:#252836;--th:#2d3147;--tbr:#3d4266;--ct:#c8cce8;--ch:#353a55;
  --json-bg:#0d1117;--jk:#79b8ff;--js:#9ecbff;--jn:#f8c555;
}
[data-theme="light"]{
  --bg:#f0f2f8;--surface:#fff;--s2:#f5f6fb;--s3:#e8ebf5;
  --accent:#3b73d4;--a2:#6b4ab5;--green:#1e8a4a;--red:#d63031;
  --orange:#e17a00;--text:#1a1d2e;--t2:#5a6080;--border:#d0d5e8;
  --shadow:0 4px 20px rgba(0,0,0,.14);--pk:#b8920a;--fk:#c05c00;
  --canvas-bg:#eef0f8;--grid:rgba(0,0,0,.04);
  --tb:#fff;--th:#eef1fb;--tbr:#c8cfe8;--ct:#2c3060;--ch:#f0f2ff;
  --json-bg:#f6f8ff;--jk:#0550ae;--js:#116329;--jn:#953800;
}
[data-theme="warm"]{
  --bg:#1e1710;--surface:#2a2118;--s2:#332819;--s3:#3d3020;
  --accent:#e8944a;--a2:#c45e2a;--green:#5a9e50;--red:#d94f3a;
  --orange:#f0a030;--text:#f0e8d8;--t2:#a89070;--border:#5a4530;
  --shadow:0 4px 20px rgba(0,0,0,.55);--pk:#f5c842;--fk:#e07830;
  --canvas-bg:#1a1308;--grid:rgba(255,220,160,.04);
  --tb:#2a2118;--th:#332819;--tbr:#5a4530;--ct:#e0d0b8;--ch:#3d3020;
  --json-bg:#120e08;--jk:#e8944a;--js:#a8d070;--jn:#f5c842;
}

/* ════════════════════════ RESET ════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);
  height:100vh;display:flex;flex-direction:column;overflow:hidden;
  transition:background .22s,color .22s}
button{cursor:pointer;border:none;outline:none;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ════════════════════════ TOPBAR ═══════════════════════════ */
#topbar{background:var(--surface);border-bottom:1px solid var(--border);
  height:50px;display:flex;align-items:center;padding:0 12px;gap:6px;
  flex-shrink:0;z-index:100;transition:background .22s,border-color .22s;overflow-x:auto}
#topbar::-webkit-scrollbar{display:none}
.logo{font-size:16px;font-weight:700;color:var(--accent);white-space:nowrap;margin-right:2px}
.logo span{color:var(--t2);font-weight:400}
.tb-group{display:flex;align-items:center;gap:3px;padding:3px 5px;background:var(--s2);border:1px solid var(--border);border-radius:8px;flex-shrink:0}
.tb-group .tb{border-color:transparent;background:transparent}
.tb-group .tb.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.tb-group .tb.danger{background:var(--red);color:#fff;border-color:var(--red)}
.tb-group #schema-sel{border-color:var(--border)}
.tb{padding:5px 11px;border-radius:6px;font-size:12px;font-weight:500;
  background:var(--s2);color:var(--text);border:1px solid var(--border);
  display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;
  transition:background .1s,border-color .1s}
.tb:hover:not(:disabled){background:var(--s3);border-color:var(--accent)}
.tb:disabled{opacity:.38;cursor:default;pointer-events:none}
.tb.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.tb.primary:hover{filter:brightness(1.1)}
.tb.danger{background:var(--red);color:#fff;border-color:var(--red)}
.sep{width:1px;height:22px;background:var(--border);flex-shrink:0}
#schema-sel{background:var(--s2);border:1px solid var(--border);color:var(--text);
  padding:5px 9px;border-radius:6px;font-size:12px;min-width:160px;max-width:200px}
#zoom-lbl{font-size:11px;color:var(--t2);min-width:36px;text-align:center;flex-shrink:0}
/* ── Desc toggle ── */
.desc-toggle{display:flex!important;align-items:center;gap:5px;cursor:pointer;font-size:11px;user-select:none}
.desc-toggle input{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}
/* ── FK optgroup styles ── */
select optgroup{font-weight:700;color:var(--t2);font-size:11px;font-style:normal}
select optgroup option{font-weight:400;color:var(--text);padding-left:8px}

/* ── Theme dots ── */
.themes{display:flex;gap:4px;flex-shrink:0}
.tdot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.15s;flex-shrink:0}
.tdot:hover,.tdot.on{border-color:var(--text)}
.tdot[data-t="dark"] {background:radial-gradient(circle at 35% 35%,#3d4266,#1a1d27)}
.tdot[data-t="light"]{background:radial-gradient(circle at 35% 35%,#e8ebf5,#3b73d4)}
.tdot[data-t="warm"] {background:radial-gradient(circle at 35% 35%,#5a4530,#e8944a)}

/* ════════════════════════ LAYOUT ═══════════════════════════ */
#main{display:flex;flex:1;overflow:hidden}

/* ════════════════════════ SIDEBAR (vertical split) ═════════ */
#sidebar{width:340px;min-width:0;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;transition:background .22s,border-color .22s,width .15s;overflow:visible;position:relative}
#sidebar.collapsed{width:0!important;border-right:none}
/* Top part: schema tree */
#sb-left{height:200px;min-height:0;display:flex;flex-direction:column;border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden;transition:height .15s,border-color .15s}
#sb-left.collapsed{height:0!important;border-bottom:none;min-height:0}
/* Bottom part: table list */
#sb-right{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--s2);min-height:0;transition:height .15s,flex .15s}
#sb-right.collapsed{height:0!important;flex:none;min-height:0}
/* Resize handle between top and bottom (horizontal bar) */
#sb-divider{height:5px;background:transparent;cursor:row-resize;flex-shrink:0;position:relative;z-index:5}
#sb-divider:hover,#sb-divider.dragging{background:var(--accent)55}
/* Resize handle on sidebar right edge */
#sb-resize{position:absolute;right:-3px;top:0;bottom:0;width:6px;cursor:col-resize;z-index:10;background:transparent}
#sb-resize:hover,#sb-resize.dragging{background:var(--accent)44}
/* Collapse toggle button on sidebar edge */
#sb-toggle{position:absolute;right:-14px;top:50%;transform:translateY(-50%);
  width:14px;height:44px;background:var(--surface);border:1px solid var(--border);
  border-left:none;border-radius:0 5px 5px 0;cursor:pointer;z-index:20;
  display:flex;align-items:center;justify-content:center;
  color:var(--t2);font-size:10px;transition:background .1s,color .1s}
#sb-toggle:hover{background:var(--s2);color:var(--accent)}
.sb-hdr{padding:9px 11px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--t2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;white-space:nowrap;overflow:hidden}
.sb-hdr .icon-btn{background:none;color:var(--t2);font-size:14px;padding:1px 5px;border-radius:4px;flex-shrink:0}
.sb-hdr .icon-btn:hover{background:var(--s2);color:var(--text)}
#schema-tree{flex:1;overflow-y:auto;padding:5px}
/* Tree nodes */
.tnode{padding:4px 7px;border-radius:5px;cursor:pointer;font-size:12px;
  display:flex;align-items:center;gap:4px;transition:.09s;position:relative;user-select:none}
.tnode:hover{background:var(--s2)}
.tnode.active{background:var(--s3);color:var(--accent)}
.tnode .tbadge{font-size:10px;padding:1px 5px;border-radius:9px;background:var(--s3);color:var(--t2);margin-left:auto;flex-shrink:0}
.tnode.child{padding-left:18px}
.tnode .detach{display:none;font-size:9px;padding:1px 5px;border-radius:3px;background:var(--orange);color:#fff;margin-left:3px}
.tnode:hover .detach{display:inline}
.tnode-toggle{font-size:10px;cursor:pointer;color:var(--t2);flex-shrink:0;width:12px;text-align:center;transition:transform .15s;display:inline-block}
.tnode-toggle.open{transform:rotate(90deg)}
/* Schema context menu */
#schema-ctx{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:7px;
  z-index:3000;min-width:170px;box-shadow:var(--shadow);display:none;padding:3px 0}
.schema-ci{padding:6px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.07s}
.schema-ci:hover{background:var(--s2)}
.schema-ci.danger{color:var(--red)}
/* ── Tables panel (table format) ── */
#sb-tbl-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:0}
.sb-tbl{width:100%;border-collapse:collapse;font-size:11px}
.sb-tbl th{padding:4px 7px;text-align:left;font-size:9px;font-weight:700;color:var(--t2);
  text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--s2);z-index:1}
.sb-tbl .sb-cat-row{cursor:pointer;user-select:none}
.sb-tbl .sb-cat-row td{padding:5px 7px;font-size:10px;font-weight:700;color:var(--t2);
  text-transform:uppercase;letter-spacing:.3px;background:var(--s3);border-bottom:1px solid var(--border)}
.sb-tbl .sb-cat-row:hover td{background:var(--accent)11}
.sb-tbl .sb-tbl-row{cursor:pointer;transition:.08s}
.sb-tbl .sb-tbl-row td{padding:3px 7px;border-bottom:1px solid var(--border);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px}
.sb-tbl .sb-tbl-row:hover td{background:var(--s3)}
.sb-tbl .sb-tbl-row.active td{background:var(--accent)22;color:var(--accent)}
.sb-desc-cell,.sb-asg-cell{color:var(--t2);font-size:10px}
.sb-gs-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block;margin-right:4px;vertical-align:middle}
.sb-gs-dot.exists{background:var(--green)}
.sb-gs-dot.missing{background:var(--border)}

/* ════════════════════════ CANVAS ═══════════════════════════ */
#canvas-wrap{flex:1;overflow:hidden;position:relative;background:var(--canvas-bg);transition:background .22s}
#canvas-wrap canvas{display:block}
#mini-map{position:absolute;bottom:12px;right:12px;width:150px;height:95px;
  background:rgba(0,0,0,.28);backdrop-filter:blur(3px);
  border:1px solid var(--border);border-radius:7px;overflow:hidden;pointer-events:none}
[data-theme="light"] #mini-map{background:rgba(255,255,255,.55)}
#mini-map canvas{display:block}

/* ════════════════════════ RIGHT PANEL ══════════════════════ */
#rpanel{width:290px;min-width:250px;background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:visible;position:relative;
  transition:width .16s,min-width .16s,border .16s,background .22s; z-index:100}
#rpanel.hidden{width:0;min-width:0;border-left:none}

#rp-resize{position:absolute;left:-3px;top:0;bottom:0;width:6px;cursor:col-resize;z-index:10;background:transparent}
#rp-resize:hover,#rp-resize.dragging{background:var(--accent)44}

#rp-toggle{position:absolute;left:-14px;top:50%;transform:translateY(-50%);
  width:14px;height:44px;background:var(--surface);border:1px solid var(--border);
  border-right:none;border-radius:5px 0 0 5px;cursor:pointer;z-index:20;
  display:flex;align-items:center;justify-content:center;
  color:var(--t2);font-size:10px;transition:background .1s,color .1s}
#rp-toggle:hover{background:var(--s2);color:var(--accent)}
.ptabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.ptab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;
  color:var(--t2);border-bottom:2px solid transparent;transition:.1s}
.ptab.on{color:var(--accent);border-bottom-color:var(--accent)}
.pbody{flex:1;overflow-y:auto;padding:11px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--t2);margin-bottom:3px;
  text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;padding:6px 8px;background:var(--s2);
  border:1px solid var(--border);color:var(--text);border-radius:5px;font-size:12px;transition:border-color .1s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:46px}
.fg select option{background:var(--s2)}
.savebtn{width:100%;padding:7px;background:var(--accent);color:#fff;border-radius:6px;font-weight:600;font-size:12px}
.savebtn:hover{filter:brightness(1.1)}
.col-list{list-style:none}
.col-item{display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:4px;
  margin-bottom:2px;background:var(--s2);border:1px solid var(--border);cursor:grab;transition:border-color .1s}
.col-item:hover{border-color:var(--accent)}
.col-item.dragging{opacity:.38}
.cbadge{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;
  background:var(--s3);color:var(--t2);flex-shrink:0;min-width:22px;text-align:center}
.cbadge.pk{background:#f1c40f1a;color:var(--pk)}
.cbadge.fk{background:#e67e221a;color:var(--fk)}
.cname{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cacts{display:flex;gap:2px}
.cacts button{padding:2px 5px;border-radius:3px;font-size:10px;background:var(--s3);color:var(--t2)}
.cacts .del{color:var(--red)}
.addcol{width:100%;padding:5px;border:1px dashed var(--border);border-radius:5px;
  background:none;color:var(--t2);font-size:11px;margin-top:4px}
.addcol:hover{border-color:var(--accent);color:var(--accent)}

/* ── Right Panel Columns Table ── */
.rp-table {width:100%;border-collapse:collapse;table-layout:fixed;margin-top:4px}
.rp-table th {background:var(--s3);padding:4px 6px;text-align:left;font-size:9px;font-weight:700;
  color:var(--t2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.rp-table td {padding:4px 6px;font-size:11px;border-bottom:1px solid var(--border);
  vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rp-table tr:last-child td {border-bottom:none}
.rp-table tr:hover td {background:var(--s3)}
.rp-table .drag-h {cursor:grab;color:var(--t2);width:16px;text-align:center;font-size:14px}
.rp-table .td-name {font-weight:600;width:40%}
.rp-table .td-desc,.rp-table .td-note {color:var(--t2);font-size:10px}
.rp-table .td-acts {width:64px;text-align:right}
.rp-table .td-acts button {background:none;color:var(--t2);padding:2px 4px;font-size:10px}
.rp-table .td-acts button:hover {color:var(--accent)}
.rp-table .td-acts .del:hover {color:var(--red)}
.rp-table .dragging {opacity:.38;background:var(--accent)11}

/* ════════════════════════ MODALS ═══════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:.14s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:11px;
  padding:20px;min-width:320px;max-width:490px;width:90%;box-shadow:var(--shadow);
  transform:translateY(-8px);transition:.14s;max-height:90vh;overflow-y:auto}
.overlay.show .modal{transform:translateY(0)}
.modal h3{font-size:14px;font-weight:700;margin-bottom:14px}

/* Instruction tabs */
.inst-tab{flex:1;text-align:center;padding:12px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);border-bottom:2px solid transparent;transition:all 0.15s ease}
.inst-tab:hover{color:var(--text);background:var(--s2)}
.inst-tab.on{color:var(--accent);border-bottom-color:var(--accent);background:var(--surface)}
.inst-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.03)}
.inst-card h4{color:var(--accent);font-size:14px;margin-bottom:10px}
.inst-card ul{padding-left:20px;font-size:13px;line-height:1.6;color:var(--text)}
.inst-card code{background:var(--s3);padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600;color:var(--t2)}
.mfooter,.modal-footer{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}
.mfooter button,.modal-footer button{padding:6px 15px;border-radius:6px;font-weight:600;font-size:12px}
.mfooter .cancel,.modal-footer .cancel{background:var(--s2);color:var(--t2);border:1px solid var(--border)}
.mfooter .confirm,.modal-footer .confirm{background:var(--accent);color:#fff}
.mfooter .danger,.modal-footer .danger{background:var(--red);color:#fff}

/* ════════════════════════ TOAST ════════════════════════════ */
#toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{padding:8px 16px;border-radius:7px;font-size:12px;font-weight:500;
  box-shadow:var(--shadow);animation:tin .16s ease;pointer-events:none}
.toast.ok {background:#1a3e28;border:1px solid var(--green);color:#60f0a0}
.toast.err{background:#3e1a1a;border:1px solid var(--red);color:#f08080}
.toast.inf{background:#1a273e;border:1px solid var(--accent);color:#8ab4f8}
[data-theme="light"] .toast.ok {background:#d4f5e2;border-color:var(--green);color:#0c4e26}
[data-theme="light"] .toast.err{background:#fde8e8;border-color:var(--red);color:#800000}
[data-theme="light"] .toast.inf{background:#deeeff;border-color:var(--accent);color:#092870}
@keyframes tin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ════════════════════════ CTX MENU ═════════════════════════ */
#ctx{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:7px;
  z-index:2000;min-width:160px;box-shadow:var(--shadow);display:none;padding:3px 0}
.ci{padding:6px 11px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.07s}
.ci:hover{background:var(--s2)}
.ci.danger{color:var(--red)}
.csep{height:1px;background:var(--border);margin:2px 0}

/* ════════════════════════ LOADER ═══════════════════════════ */
#loader{position:fixed;inset:0;background:var(--bg);z-index:9998;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* ════════════════════════ TEMPLATES ════════════════════════ */
.tpl-item{padding:6px 8px;border-radius:5px;cursor:pointer;font-size:12px;
  display:flex;align-items:center;gap:5px;border:1px solid var(--border);background:var(--s2);transition:.1s;margin-bottom:3px}
.tpl-item:hover{border-color:var(--accent)}
.tpl-item.on{border-color:var(--accent);background:var(--s3)}
.tpl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tcol-row{display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:4px;
  background:var(--s2);border:1px solid var(--border);margin-bottom:3px}
.tcol-row:hover{border-color:var(--accent)}
.dh{cursor:grab;color:var(--t2);font-size:12px;flex-shrink:0}
.tcbadge{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;
  background:var(--s3);color:var(--t2);flex-shrink:0;min-width:24px;text-align:center}
.tcbadge.pk{background:#f1c40f1a;color:var(--pk)}
.tcbadge.fk{background:#e67e221a;color:var(--fk)}
.tprow{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid var(--border)}
.tprow:last-child{border-bottom:none}

/* ════════════════════════ DICTS ════════════════════════════ */
.dtabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:10px;flex-shrink:0}
.dtab{padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;
  color:var(--t2);border-bottom:2px solid transparent;transition:.1s}
.dtab.on{color:var(--accent);border-bottom-color:var(--accent)}
.drow{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:5px;
  background:var(--s2);border:1px solid var(--border);margin-bottom:3px;transition:.1s}
.drow:hover{border-color:var(--accent)}
