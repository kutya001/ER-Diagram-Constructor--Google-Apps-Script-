<script>// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function isTrue(v){return v===true||v==='true'||v==='TRUE';}
const CAT_CLR=['#5b8dee','#27ae60','#e67e22','#e74c3c','#9b59b6','#1abc9c','#f39c12','#3498db'];
function catColor(id){if(!id)return C.tbr;let h=0;for(const c of String(id)){h=Math.imul(31,h)+c.charCodeAt(0)|0;}return CAT_CLR[Math.abs(h)%CAT_CLR.length];}
function trunc(s,n){return s&&s.length>n?s.slice(0,n)+'…':s||'';}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ea(s){if(!s)return'';return String(s).replace(/"/g,'&quot;');}
function fmtD(d){
  if(!d)return'—';
  try{
    const dt=new Date(d);
    const pad=n=>String(n).padStart(2,'0');
    return `${pad(dt.getDate())}.${pad(dt.getMonth()+1)}.${dt.getFullYear()} ${pad(dt.getHours())}:${pad(dt.getMinutes())}:${pad(dt.getSeconds())}`;
  }catch{return d;}
}
// FK table options grouped by category (optgroup)
function fkTableOptsByCategory(tables,selId){
  // Sort all tables alphabetically by name
  const sortedTables = [...tables].sort((a,b) => (a.name||'').localeCompare(b.name||'', undefined, {numeric: true, sensitivity: 'base'}));
  
  const byCat={};
  sortedTables.forEach(t=>{
    const cid=String(t.category_id||'__none__');
    if(!byCat[cid])byCat[cid]=[];
    byCat[cid].push(t);
  });

  // Sort category IDs alphabetically by category name, putting '__none__' last
  const sortedCids = Object.keys(byCat).sort((a, b) => {
    if (a === '__none__') return 1;
    if (b === '__none__') return -1;
    const catA = S.cats.find(c => String(c.id) === a);
    const catB = S.cats.find(c => String(c.id) === b);
    return (catA?.name || '').localeCompare(catB?.name || '', undefined, {numeric: true, sensitivity: 'base'});
  });

  let html='';
  sortedCids.forEach(cid => {
    const ts = byCat[cid];
    const cat = S.cats.find(c=>String(c.id)===cid);
    const label = cat ? cat.name : 'Без категории';
    if(sortedCids.length > 1){
      html += `<optgroup label="${ea(label)}">`;
    }
    ts.forEach(t=>{
      html += `<option value="${t.id}"${String(t.id)===String(selId)?' selected':''}>${esc(t.name)}</option>`;
    });
    if(sortedCids.length > 1){
      html += `</optgroup>`;
    }
  });
  return html;
}</script>
