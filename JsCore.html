<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════════════
const TC = {
  dark:  {tb:'#252836',th:'#2d3147',tbr:'#3d4266',ts:'#5b8dee',ht:'#e8eaf6',ct:'#c8cce8',ch:'#353a55',pk:'#f1c40f',fk:'#e67e22',li:'#5b8dee',lh:'#7c5cbf',cb:'#3d4266',gr:'rgba(255,255,255,.03)',bg:'#1a1d27',t2:'#9da5c9',s3:'#353a55'},
  light: {tb:'#fff',  th:'#eef1fb',tbr:'#c8cfe8',ts:'#3b73d4',ht:'#1a1d2e',ct:'#2c3060',ch:'#f0f2ff',pk:'#b8920a',fk:'#c05c00',li:'#3b73d4',lh:'#6b4ab5',cb:'#d0d5e8',gr:'rgba(0,0,0,.04)',bg:'#eef0f8',t2:'#5a6080',s3:'#e8ebf5'},
  warm:  {tb:'#2a2118',th:'#332819',tbr:'#5a4530',ts:'#e8944a',ht:'#f0e8d8',ct:'#e0d0b8',ch:'#3d3020',pk:'#f5c842',fk:'#e07830',li:'#e8944a',lh:'#c45e2a',cb:'#5a4530',gr:'rgba(255,220,160,.04)',bg:'#1a1308',t2:'#a89070',s3:'#3d3020'},
};
let curTheme = localStorage.getItem('er_theme')||'dark';
let C = {...TC[curTheme]};

function setTheme(t) {
  curTheme=t; C={...TC[t]};
  document.body.dataset.theme=t;
  localStorage.setItem('er_theme',t);
  document.querySelectorAll('.tdot').forEach(d=>d.classList.toggle('on',d.dataset.t===t));
  R(); MR();
}
document.body.dataset.theme=curTheme;
document.querySelectorAll('.tdot').forEach(d=>d.classList.toggle('on',d.dataset.t===curTheme));

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = {
  schemas:[],tables:[],columns:[],cats:[],asgs:[],ctypes:[],
  tpls:[],tcols:[],
  schema:null,table:null,tab:'props',
};

// ═══════════════════════════════════════════════════════════
// SYNC ENGINE  — smart queue, debounced
// ═══════════════════════════════════════════════════════════
const SQ = [];        // sync queue [{action, payload, resolve, reject}]
let syncRunning=false,syncErrCount=0;
let syncTO=null;

function queueSync(action, payload, preState=null){
  return new Promise((resolve,reject)=>{
    const logId = Date.now() + Math.random().toString(36).substr(2, 5);
    SQ.push({logId, action, payload, preState, resolve, reject});
    clearTimeout(syncTO);
    setSyncState('pending');
    syncTO=setTimeout(flushSync, 1000);
  });
}

// High-level debounced trigger: collects changes and sends after 1s of inactivity
let _triggerTimer=null;
const _pendingPayloads=[];
function triggerSync(action, payload){
  _pendingPayloads.push({action,payload});
  clearTimeout(_triggerTimer);
  _triggerTimer=setTimeout(()=>{
    _pendingPayloads.splice(0).forEach(p=>queueSync(p.action,p.payload));
  },1000);
  setSyncState('pending');
}

const syncLog=[];
const SYNC_LOG_MAX=50;
function logSync(action,ok,detail,meta={}){
  const entry = {id:meta.logId||Date.now(), ts:new Date(), action, ok, detail, payload:meta.payload, preState:meta.preState, resultId:meta.resultId};
  syncLog.unshift(entry);
  if(syncLog.length>SYNC_LOG_MAX)syncLog.length=SYNC_LOG_MAX;
  renderSyncBadge();
}
function renderSyncBadge(){
  const b=document.getElementById('sync-badge');
  if(!b)return;
  b.textContent=syncLog.length?String(syncLog.length):'';
  b.style.display=syncLog.length?'':'none';
}

async function flushSync(){
  if(syncRunning||!SQ.length){return;}
  syncRunning=true;
  setSyncState('syncing');
  const batch=[...SQ]; SQ.length=0;
  try{
    const reqs=batch.map(b=>({action:b.action,payload:b.payload}));
    const results = await new Promise((res,rej)=>{
      google.script.run
        .withSuccessHandler(r=>r.ok?res(r.data):rej(new Error(r.error)))
        .withFailureHandler(e=>rej(new Error(e.message||String(e))))
        .processBatch(reqs);
    });
    batch.forEach((b,i)=>{
      const res = results[i];
      if(res && res.ok === false) {
        logSync(b.action, false, res.error, {logId:b.logId, payload:b.payload, preState:b.preState});
        b.reject && b.reject(new Error(res.error));
      } else {
        const resultId = res && res.data && res.data.id ? res.data.id : null;
        logSync(b.action, true, JSON.stringify(b.payload).substring(0,80), {logId:b.logId, payload:b.payload, preState:b.preState, resultId});
        b.resolve && b.resolve(res ? res.data : undefined);
      }
    });
    syncErrCount=0;
    if(!SQ.length)setSyncState('synced');
  }catch(e){
    syncErrCount++;
    batch.forEach(b=>{
      logSync(b.action,false,e.message||String(e));
      SQ.push(b);
    });
    if(syncErrCount<3){syncTO=setTimeout(flushSync,2000);}
    else{
      try{
        const failed=batch.map(b=>({action:b.action,payload:b.payload}));
        localStorage.setItem('er_failed_sync',JSON.stringify(failed));
      }catch(e2){}
      batch.forEach(b=>b.reject&&b.reject(e));
      toast('Ошибка синхронизации — данные сохранены локально','err');
    }
    setSyncState('error');
  }finally{syncRunning=false;}
  if(SQ.length)flushSync();
}

async function syncNow(){
  setSyncState('syncing');
  clearTimeout(syncTO);
  await flushSync();
  if(syncErrCount===0&&!SQ.length){
    setSyncState('synced');
    toast('Синхронизировано','ok');
  } else {
    setSyncState('error');
    toast('Ошибка синхронизации','err');
  }
}

let syncResetTimer=null;
function setSyncState(state){
  const btn=document.getElementById('btn-sync');
  if(!btn)return;
  if(syncResetTimer)clearTimeout(syncResetTimer);
  btn.classList.remove('syncing','synced','error');
  if(state==='syncing'){
    btn.classList.add('syncing');
    btn.title='Синхронизация...';
  }else if(state==='synced'){
    btn.classList.add('synced');
    btn.title='Синхронизировано';
    syncResetTimer=setTimeout(()=>{btn.classList.remove('synced');btn.title='Синхронизировать данные';},3000);
  }else if(state==='error'){
    btn.classList.add('error');
    btn.title='Ошибка синхронизации';
  }else if(state==='pending'){
    btn.title='Ожидание синхронизации...';
  }else{
    btn.title='Синхронизировать данные';
  }
}

function toggleSyncDetails(){
  let panel=document.getElementById('sync-details');
  if(panel){panel.remove();return;}
  panel=document.createElement('div');
  panel.id='sync-details';
  let html='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><b>История синхронизации</b><button onclick="this.parentElement.parentElement.remove()" style="background:none;color:var(--t2);border:none;cursor:pointer;font-size:16px">✕</button></div>';
  if(!syncLog.length){html+='<div style="color:var(--t2);font-size:11px">Нет записей</div>';}
  else{
    html+='<div style="max-height:450px;overflow-y:auto;padding-right:4px">';
    syncLog.forEach(e=>{
      const t=e.ts.toLocaleTimeString();
      const icon=e.ok?'✅':'❌';
      html+=`<div class="log-row" id="log-${e.id}">
        <div class="log-meta">
          <div><span class="log-ts">${t}</span> ${icon} <b>${esc(e.action)}</b></div>
          <div class="log-acts">
            <button class="log-btn" onclick="syncRetry('${e.id}')" title="Повторить">♻️</button>
            ${e.ok?`<button class="log-btn undo" onclick="syncUndo('${e.id}')" title="Отменить">↩️</button>`:''}
          </div>
        </div>
        <div class="log-det">${esc(e.detail)}</div>
      </div>`;
    });
    html+='</div>';
  }
  panel.innerHTML=html;
  document.body.appendChild(panel);
}

function syncRetry(logId){
  const e=syncLog.find(l=>String(l.id)===String(logId));
  if(!e)return;
  toast('Повтор: '+e.action, 'inf');
  api(e.action, e.payload);
}

async function syncUndo(logId){
  const e=syncLog.find(l=>String(l.id)===String(logId));
  if(!e||!e.ok)return;
  
  const a=e.action;
  const p=e.payload;
  const pre=e.preState;
  
  try {
    if(a==='updateTable'||a==='updateColumn'||a==='updateCategory'||a==='updateAssignment'||a==='updateTemplate') {
      if(!pre){toast('Нет данных для отмены','err'); return;}
      toast('Отмена изменений...','inf');
      await api(a, pre);
    } 
    else if(a==='createTable'||a==='createColumn') {
      const id = e.resultId;
      if(!id){toast('Не найден ID для удаления','err'); return;}
      toast('Удаление созданного объекта...','inf');
      await api(a.replace('create','delete'), {id});
      if(a==='createTable') { selTables.delete(id); R(); MR(); renderPanel(); }
    }
    else if(a==='deleteTable') {
      if(!pre){toast('Нет данных для восстановления','err'); return;}
      toast('Восстановление таблицы...','inf');
      await api('createTable', pre); // createTable on server handles existing IDs if passed (usually)
    }
    else if(a==='deleteColumn') {
      if(!pre){toast('Нет данных для восстановления','err'); return;}
      toast('Восстановление колонки...','inf');
      await api('createColumn', pre);
    }
    else {
      toast('Для данного действия отмена не реализована','err');
    }
  } catch(err) {
    toast('Ошибка отмены: '+err.message, 'err');
  }
}

/** Повторить сохранение локальных действий, которые не удалось отправить */
async function retryFailedSync(){
  const raw = localStorage.getItem('er_failed_sync');
  if(!raw){toast('Нет несохранённых данных','inf');return;}
  let failed;
  try{failed=JSON.parse(raw);}catch(e){toast('Ошибка чтения локальных данных','err');return;}
  toast('Повторная отправка '+failed.length+' действий…','inf');
  syncErrCount=0;
  try{
    const reqs=failed.map(b=>({action:b.action,payload:b.payload}));
    await new Promise((res,rej)=>{
      google.script.run
        .withSuccessHandler(r=>r.ok?res(r.data):rej(new Error(r.error)))
        .withFailureHandler(e=>rej(new Error(e.message||String(e))))
        .processBatch(reqs);
    });
    localStorage.removeItem('er_failed_sync');
    toast('Данные успешно синхронизированы','ok');
  }catch(e){
    toast('Повторная ошибка: '+e.message,'err');
  }
}

// Column cache – invalidated on mutation
const CC = new Map();
function gc(tid){
  const k=String(tid);
  if(!CC.has(k)) CC.set(k,S.columns.filter(c=>String(c.table_id)===k).sort((a,b)=>+a.position-+b.position));
  return CC.get(k);
}
function inv(tid){tid?CC.delete(String(tid)):CC.clear();}

// ═══════════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════════
const cv  = document.getElementById('canvas');
const ctx = cv.getContext('2d',{alpha:false});
const mc  = document.getElementById('mini-canvas');
const mctx= mc.getContext('2d',{alpha:false});
const TW=220,TH=38,CH=28;

let sc=1,ox=80,oy=80;
let pan=false,panS=null;
let drag=false,dragSet=[],panMoved=false;
let selTables=new Set();
let relDraw=false,relSrc=null,relPos=null;
let pending={},hovT=null,hovC=null;
let descMode=false;
function toggleDescMode(v){descMode=v;R();MR();}

// RAF flags
let rAF=false,mrAF=false;
function R(){if(rAF)return;rAF=true;requestAnimationFrame(()=>{rAF=false;render();});}
function MR(){if(mrAF)return;mrAF=true;requestAnimationFrame(()=>{mrAF=false;miniRender();});}

// ═══════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════
const api=(action,p={})=>{
  const readOnly = /^(get|list|export|analyse)/.test(action);
  if (readOnly) {
    return new Promise((res,rej)=>{
      google.script.run
        .withSuccessHandler(r=>r.ok?res(r.data):rej(new Error(r.error)))
        .withFailureHandler(e=>rej(new Error(e.message||String(e))))
        .processRequest(action,p);
    });
  } else {
    // Capture preState for reversible actions
    let pre = null;
    if(action==='updateTable'||action==='deleteTable') pre = S.tables.find(t=>String(t.id)===String(p.id));
    if(action==='updateColumn'||action==='deleteColumn') pre = S.columns.find(c=>String(c.id)===String(p.id));
    if(action==='updateCategory') pre = S.cats.find(c=>String(c.id)===String(p.id));
    if(action==='updateAssignment') pre = S.asgs.find(a=>String(a.id)===String(p.id));
    if(pre) pre = JSON.parse(JSON.stringify(pre)); // Deep clone
    
    return queueSync(action, p, pre);
  }
};
const apiBatch=reqs=>new Promise((res,rej)=>{
  google.script.run
    .withSuccessHandler(r=>r.ok?res(r.data):rej(new Error(r.error)))
    .withFailureHandler(e=>rej(new Error(e.message||String(e))))
    .processBatch(reqs);
});
const apiAll=()=>new Promise((res,rej)=>{
  google.script.run
    .withSuccessHandler(r=>r.ok?res(r.data):rej(new Error(r.error)))
    .withFailureHandler(e=>rej(new Error(e.message||String(e))))
    .loadAllData();
});
</script>
